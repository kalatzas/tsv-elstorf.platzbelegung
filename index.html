<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platzbelegungsplaner</title>

    <!-- PWA: installierbar auf Handy & Desktop -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Platzplan">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="icon-192.png">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase: geteilter Cloud-Plan -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <style>
        @media print {
            @page { size: A4 landscape; margin: 1cm; }
            body { background: #fff !important; }
            .no-print { display: none !important; }
            .print-overflow-visible { overflow: visible !important; }
            .print-min-0 { min-width: 0 !important; }
            .app-shell { height: auto !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================
        //  FIREBASE-KONFIGURATION
        //  Hier die Werte aus der Firebase Console eintragen.
        //  Schritt-für-Schritt-Anleitung: siehe README.md
        //  Solange hier "HIER_EINTRAGEN" steht, läuft die App im
        //  lokalen Modus (Daten nur auf diesem Gerät, kein Sync).
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZim5vMxYbbk77aQdJ6zHDjMwgThVRkJg",
            authDomain: "platzbelegungsplan.firebaseapp.com",
            projectId: "platzbelegungsplan",
            storageBucket: "platzbelegungsplan.firebasestorage.app",
            messagingSenderId: "552270146301",
            appId: "1:552270146301:web:3f8453b91071077ffb6c94"
        };
        // E-Mail des gemeinsamen Bearbeiter-Kontos (in Firebase
        // Authentication anlegen). Das Passwort dazu ist das
        // "Bearbeiten-Passwort", das im Verein geteilt wird.
        const EDITOR_EMAIL = "kosta@alatzas.de";
        // ============================================================

        const FIREBASE_READY = firebaseConfig.apiKey && firebaseConfig.apiKey !== "HIER_EINTRAGEN";
        let db = null, auth = null;
        if (FIREBASE_READY) {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
            } catch (e) {
                console.error('Firebase-Initialisierung fehlgeschlagen:', e);
            }
        }
        // Der gesamte Plan liegt in einem Dokument: plans/tsv-elstorf
        const planDoc = () => db.collection('plans').doc('tsv-elstorf');

        const App = () => {
            const APP_VERSION = '2.1.0'; // SemVer: Major.Minor.Patch
            
            const [events, setEvents] = useState([]);
            const [isEditor, setIsEditor] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginPassword, setLoginPassword] = useState('');
            const [loggingIn, setLoggingIn] = useState(false);
            const [cloudStatus, setCloudStatus] = useState(FIREBASE_READY ? 'connecting' : 'local');
            const [dataLoaded, setDataLoaded] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingEvent, setEditingEvent] = useState(null);
            const [showExportModal, setShowExportModal] = useState(false);
            const [showSeriesModal, setShowSeriesModal] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [viewMode, setViewMode] = useState(() => (typeof window !== 'undefined' && window.innerWidth < 768) ? 'calendar' : 'table'); // table, calendar, fields
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [showFilters, setShowFilters] = useState(false);
            const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
            const [currentWeek, setCurrentWeek] = useState(0);
            const [hoveredEvent, setHoveredEvent] = useState(null);
            const [hoverPosition, setHoverPosition] = useState({ x: 0, y: 0 });
            const [filters, setFilters] = useState({
                field: '',
                type: '',
                team: ''
            });
            
            const fields = [
                { id: 'platz1', name: 'Platz 1', shortName: 'P1', color: 'bg-red-50 border-red-200', headerColor: 'bg-red-500' },
                { id: 'platz2', name: 'Platz 2', shortName: 'P2', color: 'bg-blue-50 border-blue-200', headerColor: 'bg-blue-500' },
                { id: 'platz3', name: 'Platz 3', shortName: 'P3', color: 'bg-green-50 border-green-200', headerColor: 'bg-green-500' },
                { id: 'grundschule', name: 'Grundschule', shortName: 'GS', color: 'bg-yellow-50 border-yellow-200', headerColor: 'bg-yellow-500' },
                { id: 'kunstrasen', name: 'Kunstrasen', shortName: 'KR', color: 'bg-purple-50 border-purple-200', headerColor: 'bg-purple-500' }
            ];

            const timeSlots = (() => {
                const slots = [];
                for (let h = 8; h <= 22; h++) {
                    slots.push(`${String(h).padStart(2, '0')}:00`);
                    if (h < 22) slots.push(`${String(h).padStart(2, '0')}:30`);
                }
                return slots;
            })();
            const weekdays = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            const teams = ['U8', 'U9', 'U10', 'U11', 'U12', 'U13', 'U14', 'U15', 'U16', 'U17', 'U18', 'U19'];
            const cabins = ['Kabine 1', 'Kabine 2', 'Kabine 3', 'Kabine 4', 'Kabine 5'];
            const positions = [
                { value: '', label: 'Keine Angabe', short: '', icon: '' },
                { value: 'li', label: 'Links', short: 'Li', icon: '⬅️' },
                { value: 'mi', label: 'Mitte', short: 'Mi', icon: '⏺️' },
                { value: 're', label: 'Rechts', short: 'Re', icon: '➡️' }
            ];

            const eventTypes = {
                training: { label: 'Training', color: 'bg-green-500', icon: '🏃‍♂️' },
                match: { label: 'Pflichtspiel', color: 'bg-blue-500', icon: '⚽' },
                friendly: { label: 'Freundschaftsspiel', color: 'bg-yellow-500', icon: '🤝' },
                cup: { label: 'Pokalspiel', color: 'bg-purple-500', icon: '🏆' },
                makeup: { label: 'Nachholspiel', color: 'bg-red-500', icon: '🔄' },
                blocked: { label: 'Platzsperre', color: 'bg-gray-600', icon: '🚫' }
            };

            const [newEvent, setNewEvent] = useState({
                field: '', day: '', time: '', duration: 1.5, type: 'training',
                team: '', title: '', cabin: '', trainer: '', position: ''
            });

            const [seriesEvent, setSeriesEvent] = useState({
                field: '', day: '', time: '', duration: 1.5, type: 'training',
                team: '', title: '', cabin: '', trainer: '', position: '', weeks: 10
            });

            // Gefilterte Events
            const getFilteredEvents = () => {
                return events.filter(event => {
                    // Prüfe ob Event in der aktuellen Woche liegt
                    if (event.weekOffset !== undefined) {
                        // Für Serientermine: Prüfe ob sie in der aktuellen Woche liegen
                        if (event.weekOffset !== currentWeek) return false;
                    }
                    
                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    return true;
                });
            };

            // Termine eines bestimmten Wochentags in einer bestimmten Woche
            const getEventsForDay = (dayName, weekOffset) => {
                return events.filter(event => {
                    if (event.day !== dayName) return false;
                    if (event.weekOffset !== undefined && event.weekOffset !== weekOffset) return false;
                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    return true;
                });
            };

            // Liste kommender Tage ab heute (für die mobile Scroll-Ansicht)
            const getUpcomingDays = (count) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const thisMonday = getWeekStart(0);
                thisMonday.setHours(0, 0, 0, 0);
                const list = [];
                for (let i = 0; i < count; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    const dow = (d.getDay() + 6) % 7; // 0 = Montag
                    const dMonday = new Date(d);
                    dMonday.setDate(d.getDate() - dow);
                    const weekOffset = Math.round((dMonday - thisMonday) / (7 * 86400000));
                    list.push({
                        date: d,
                        dayName: weekdays[dow],
                        dateNum: d.getDate(),
                        month: d.getMonth() + 1,
                        weekOffset,
                        isToday: i === 0
                    });
                }
                return list;
            };

            // Hilfsfunktionen
            const getWeekStart = (weekOffset = 0) => {
                const today = new Date();
                const daysToMonday = today.getDay() === 0 ? 6 : today.getDay() - 1;
                const monday = new Date(today);
                monday.setDate(today.getDate() - daysToMonday + (weekOffset * 7));
                return monday;
            };

            const formatDate = (date) => date.toLocaleDateString('de-DE');

            const getWeekDates = (weekOffset = 0) => {
                const weekStart = getWeekStart(weekOffset);
                const today = new Date();
                return weekdays.map((day, index) => {
                    const date = new Date(weekStart);
                    date.setDate(weekStart.getDate() + index);
                    const isToday = date.getDate() === today.getDate()
                        && date.getMonth() === today.getMonth()
                        && date.getFullYear() === today.getFullYear();
                    return { day, date: date.getDate(), month: date.getMonth() + 1, isToday };
                });
            };

            const getEventEndTime = (event) => {
                const startTime = parseFloat(event.time.replace(':', '.').replace('30', '5'));
                const endTime = startTime + event.duration;
                const hours = Math.floor(endTime);
                const minutes = (endTime - hours) * 60;
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            };

            // Hover-Handler
            const handleEventHover = (event, mouseEvent) => {
                setHoveredEvent(event);
                setHoverPosition({
                    x: mouseEvent.clientX,
                    y: mouseEvent.clientY
                });
            };

            const handleEventLeave = () => {
                setHoveredEvent(null);
            };

            // Termin-Karte (Kalenderansicht – Desktop und Handy)
            const renderEventCard = (event) => {
                const eventType = eventTypes[event.type];
                const field = fields.find(f => f.id === event.field);
                return (
                    <div
                        key={event.id}
                        className={`${field?.color} border rounded-lg shadow-sm text-xs cursor-pointer hover:shadow transition-shadow`}
                        onClick={() => setEditingEvent({...event})}
                        onMouseEnter={(e) => handleEventHover(event, e)}
                        onMouseLeave={handleEventLeave}
                        onMouseMove={(e) => {
                            if (hoveredEvent?.id === event.id) {
                                setHoverPosition({ x: e.clientX, y: e.clientY });
                            }
                        }}
                    >
                        <div className={`${eventType.color} text-white text-xs px-2 py-1 rounded-t-lg font-medium flex items-center gap-1`}>
                            <span>{eventType.icon}</span>
                            <span className="truncate">{eventType.label}</span>
                        </div>
                        <div className="p-2">
                            <div className="font-semibold text-gray-800">{event.time} - {getEventEndTime(event)}</div>
                            <div className="font-semibold text-gray-800">{event.team}</div>
                            <div className="text-gray-600">{field?.name}</div>
                            {event.trainer && <div className="text-gray-600">👨‍🏫 {event.trainer}</div>}
                            {event.cabin && <div className="text-gray-600">🚪 {event.cabin}</div>}
                            {event.position && <div className="text-gray-600">{positions.find(p => p.value === event.position)?.icon} {positions.find(p => p.value === event.position)?.label}</div>}
                            {event.isSeriesEvent && <div className="text-gray-600">🔄 Serie</div>}
                        </div>
                    </div>
                );
            };

            // Hilfsfunktion für Event-Positionierung
            const getEventPositions = (day) => {
                const filteredEvents = getFilteredEvents();
                const dayEvents = filteredEvents.filter(e => e.day === day);
                const positions = [];
                
                dayEvents.forEach(event => {
                    const startIndex = timeSlots.indexOf(event.time);
                    if (startIndex === -1) return;
                    
                    const endIndex = startIndex + Math.ceil(event.duration * 2); // 30min pro Slot
                    
                    // Finde andere Events zur gleichen Zeit auf dem gleichen Platz
                    const sameTimeFieldEvents = dayEvents.filter(e => 
                        e.time === event.time && 
                        e.field === event.field &&
                        timeSlots.indexOf(e.time) !== -1
                    );
                    
                    // Sortiere Events nach Position (links, mitte, rechts)
                    sameTimeFieldEvents.sort((a, b) => {
                        const positionOrder = { 'li': 0, 'mi': 1, 're': 2, '': 3 };
                        const aOrder = positionOrder[a.position] !== undefined ? positionOrder[a.position] : 3;
                        const bOrder = positionOrder[b.position] !== undefined ? positionOrder[b.position] : 3;
                        return aOrder - bOrder;
                    });
                    
                    // Finde die Position dieses Events in der sortierten Liste
                    const positionInGroup = sameTimeFieldEvents.findIndex(e => e.id === event.id);
                    const groupSize = sameTimeFieldEvents.length;
                    
                    // Berechne Spalte basierend auf Zeit-Konflikten mit anderen Plätzen
                    let column = 0;
                    while (true) {
                        const conflict = positions.find(pos => 
                            pos.column === column &&
                            pos.startIndex < endIndex &&
                            pos.endIndex > startIndex &&
                            pos.field !== event.field // Nur Konflikte mit anderen Plätzen
                        );
                        
                        if (!conflict) break;
                        column++;
                    }
                    
                    positions.push({
                        ...event,
                        column,
                        startIndex,
                        endIndex,
                        positionInGroup,
                        groupSize
                    });
                });
                
                return positions;
            };

            const addNotification = (message, type = 'info', options = {}) => {
                const notification = { id: Date.now() + Math.random(), message, type, action: options.action };
                setNotifications(prev => [notification, ...prev.slice(0, 2)]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== notification.id)), options.duration || 5000);
            };

            const removeNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            // Bildschirmbreite überwachen (Handy vs. Desktop)
            useEffect(() => {
                const onResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            // ESC-Taste Handler
            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setShowAddModal(false);
                        setShowSeriesModal(false);
                        setShowExportModal(false);
                        setShowLoginModal(false);
                        setConfirmDialog(null);
                        setEditingEvent(null);
                    }
                };
                
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);
            // Beispiel-Termine (nur für den lokalen Modus ohne Firebase)
            const EXAMPLE_EVENTS = [
                { id: 1, field: 'platz2', day: 'Montag', time: '17:00', duration: 1.5, type: 'training', team: 'U15', title: 'U15 Training', cabin: 'Kabine 1', trainer: 'Max Mustermann', position: 'mi' },
                { id: 2, field: 'platz1', day: 'Dienstag', time: '18:00', duration: 2, type: 'match', team: 'U16', title: 'U16 vs FC Hamburg', cabin: 'Kabine 2', trainer: 'Anna Schmidt', position: 'li' }
            ];

            // Daten laden: Firebase-Echtzeit-Sync oder lokaler Fallback
            useEffect(() => {
                if (!FIREBASE_READY) {
                    try {
                        const saved = localStorage.getItem('football-events');
                        setEvents(saved ? JSON.parse(saved) : EXAMPLE_EVENTS);
                    } catch (e) {
                        console.error('Fehler beim Laden der Daten:', e);
                        setEvents(EXAMPLE_EVENTS);
                    }
                    setDataLoaded(true);
                    return;
                }
                const unsubData = planDoc().onSnapshot(
                    (snap) => {
                        const data = snap.exists ? snap.data() : null;
                        setEvents(data && Array.isArray(data.events) ? data.events : []);
                        setCloudStatus(snap.metadata.fromCache ? 'offline' : 'online');
                        setDataLoaded(true);
                    },
                    (err) => {
                        console.error('Firestore-Fehler:', err);
                        setCloudStatus('error');
                        setDataLoaded(true);
                        addNotification('⚠️ Cloud-Verbindung fehlgeschlagen', 'warning');
                    }
                );
                const unsubAuth = auth.onAuthStateChanged((user) => setIsEditor(!!user));
                return () => { unsubData(); unsubAuth(); };
            }, []);

            // Lokaler Fallback: in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && events.length > 0) {
                    try {
                        localStorage.setItem('football-events', JSON.stringify(events));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Daten:', e);
                        addNotification('⚠️ Daten konnten nicht gespeichert werden', 'warning');
                    }
                }
            }, [events]);

            // Termine speichern: lokal sofort, in der Cloud für alle
            const commitEvents = (next) => {
                setEvents(next);
                if (FIREBASE_READY) {
                    planDoc().set({ events: next, updatedAt: Date.now() })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('⚠️ Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Darf der aktuelle Nutzer bearbeiten?
            const canEdit = !FIREBASE_READY || isEditor;

            // Prüft, ob bearbeitet werden darf; sonst Anmelde-Dialog
            const requireEditor = () => {
                if (canEdit) return true;
                setShowLoginModal(true);
                return false;
            };

            // App-eigener Bestätigungsdialog statt window.confirm
            const askConfirm = (message, onConfirm) => setConfirmDialog({ message, onConfirm });

            const handleLogin = () => {
                if (!FIREBASE_READY) {
                    addNotification('⚠️ Firebase ist noch nicht konfiguriert', 'warning');
                    return;
                }
                if (!loginPassword) return;
                setLoggingIn(true);
                auth.signInWithEmailAndPassword(EDITOR_EMAIL, loginPassword)
                    .then(() => {
                        setShowLoginModal(false);
                        setLoginPassword('');
                        addNotification('🔓 Bearbeiten freigeschaltet', 'success');
                    })
                    .catch(() => addNotification('❌ Falsches Passwort', 'warning'))
                    .finally(() => setLoggingIn(false));
            };

            const handleLogout = () => {
                if (FIREBASE_READY && auth) auth.signOut();
                addNotification('🔒 Bearbeiten gesperrt', 'info');
            };

            const validateEvent = (event) => {
                if (event.type === 'blocked') {
                    // Für Platzsperren nur Platz, Tag und Zeit erforderlich
                    if (!event.field || !event.day || !event.time) {
                        return 'Bitte Platz, Tag und Zeit auswählen!';
                    }
                } else {
                    // Für andere Events alle Felder erforderlich
                    if (!event.field || !event.day || !event.time || !event.team || !event.title) {
                        return 'Bitte alle Pflichtfelder ausfüllen!';
                    }
                }
                return null;
            };

            const addEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(newEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                
                // Bei Platzsperre automatisch Team und Titel setzen
                const eventToAdd = {...newEvent};
                if (eventToAdd.type === 'blocked') {
                    eventToAdd.team = 'SPERRE';
                    if (!eventToAdd.title) {
                        eventToAdd.title = 'Platzsperre';
                    }
                }
                
                commitEvents([...events, { ...eventToAdd, id: Date.now() }]);
                setNewEvent({ field: '', day: '', time: '', duration: 1.5, type: 'training', team: '', title: '', cabin: '', trainer: '', position: '' });
                setShowAddModal(false);
                addNotification('✅ Termin hinzugefügt', 'success');
            };

            const updateEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(editingEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                commitEvents(events.map(e => e.id === editingEvent.id ? editingEvent : e));
                setEditingEvent(null);
                addNotification('✏️ Termin aktualisiert', 'success');
            };

            const deleteEvent = (id) => {
                if (!requireEditor()) return;
                askConfirm('Diesen Termin wirklich löschen?', () => {
                    const previous = events;
                    commitEvents(events.filter(e => e.id !== id));
                    setEditingEvent(null); // Modal schließen
                    addNotification('🗑️ Termin gelöscht', 'info', {
                        duration: 7000,
                        action: {
                            label: 'Rückgängig',
                            onClick: () => { commitEvents(previous); addNotification('↩️ Termin wiederhergestellt', 'success'); }
                        }
                    });
                });
            };

            const createSeriesEvents = () => {
                if (!requireEditor()) return;
                const error = validateEvent(seriesEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                const newEvents = [];
                const baseDate = getWeekStart(currentWeek);
                const dayIndex = weekdays.indexOf(seriesEvent.day);
                
                for (let week = 0; week < seriesEvent.weeks; week++) {
                    const eventDate = new Date(baseDate);
                    eventDate.setDate(baseDate.getDate() + dayIndex + (week * 7));
                    
                    newEvents.push({ 
                        ...seriesEvent, 
                        id: Date.now() + week, 
                        isSeriesEvent: true,
                        weekOffset: week,
                        eventDate: eventDate.toISOString()
                    });
                }
                commitEvents([...events, ...newEvents]);
                setSeriesEvent({ field: '', day: '', time: '', duration: 1.5, type: 'training', team: '', title: '', cabin: '', trainer: '', position: '', weeks: 10 });
                setShowSeriesModal(false);
                addNotification(`📅 ${newEvents.length} Serientermine erstellt`, 'success');
            };

            const exportToCSV = () => {
                const headers = ['Platz', 'Tag', 'Zeit', 'Dauer', 'Typ', 'Team', 'Titel', 'Trainer', 'Kabine', 'Position'];
                const csv = [
                    headers.join(','),
                    ...events.map(e => [
                        fields.find(f => f.id === e.field)?.name || '',
                        e.day, e.time, e.duration, eventTypes[e.type].label,
                        e.team, e.title, e.trainer || '', e.cabin || '', 
                        positions.find(p => p.value === e.position)?.label || ''
                    ].map(field => `"${field}"`).join(','))
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'termine.csv';
                a.click();
                URL.revokeObjectURL(url);
                addNotification('📥 CSV exportiert', 'success');
            };

            const exportToJSON = () => {
                const dataStr = JSON.stringify(events, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `termine_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                addNotification('💾 Backup erstellt', 'success');
            };

            const importFromJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!requireEditor()) { event.target.value = ''; return; }

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedEvents = JSON.parse(e.target.result);
                        if (Array.isArray(importedEvents)) {
                            commitEvents(importedEvents);
                            addNotification('📂 Daten importiert', 'success');
                        } else {
                            addNotification('❌ Ungültiges Dateiformat', 'warning');
                        }
                    } catch (error) {
                        addNotification('❌ Fehler beim Importieren', 'warning');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const clearFilters = () => {
                setFilters({ field: '', type: '', team: '' });
            };

            const hasActiveFilters = () => {
                return filters.field || filters.type || filters.team;
            };

            return (
                <div className="app-shell h-screen flex flex-col" style={{ height: '100dvh' }}>
                    {/* ===== FIXIERTER OBERER BEREICH ===== */}
                    <div className="flex-shrink-0 bg-gray-50">
                        <div className="max-w-7xl mx-auto px-4 pt-4">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-4 flex-wrap gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold">FC</div>
                            <div>
                                <h1 className="text-2xl font-bold">Platzbelegungsplaner</h1>
                                <p className="text-gray-600 text-sm flex items-center gap-2 flex-wrap">
                                    <span>Fußballverein Jugendabteilung • v{APP_VERSION}</span>
                                    {cloudStatus === 'online' && <span className="bg-green-100 text-green-800 px-2 py-0.5 rounded-full text-xs">☁️ Synchronisiert</span>}
                                    {cloudStatus === 'offline' && <span className="bg-orange-100 text-orange-800 px-2 py-0.5 rounded-full text-xs">📴 Offline</span>}
                                    {cloudStatus === 'connecting' && <span className="bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full text-xs">⏳ Verbinde…</span>}
                                    {cloudStatus === 'error' && <span className="bg-red-100 text-red-800 px-2 py-0.5 rounded-full text-xs">⚠️ Verbindungsfehler</span>}
                                    {cloudStatus === 'local' && <span className="bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full text-xs">💾 Lokaler Modus</span>}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2 flex-wrap no-print w-full sm:w-auto">
                            <div className="flex bg-gray-100 rounded p-1 w-full sm:w-auto">
                                <button onClick={() => setViewMode('table')} title="Tabellenansicht" aria-label="Tabellenansicht" className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1 ${viewMode === 'table' ? 'bg-white shadow font-medium' : 'hover:bg-gray-200'}`}>📊 <span>Tabelle</span></button>
                                <button onClick={() => setViewMode('calendar')} title="Kalenderansicht" aria-label="Kalenderansicht" className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1 ${viewMode === 'calendar' ? 'bg-white shadow font-medium' : 'hover:bg-gray-200'}`}>📅 <span>Kalender</span></button>
                                <button onClick={() => setViewMode('fields')} title="Platzübersicht" aria-label="Platzübersicht" className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1 ${viewMode === 'fields' ? 'bg-white shadow font-medium' : 'hover:bg-gray-200'}`}>🏟️ <span>Plätze</span></button>
                            </div>
                            <div className="flex gap-2 flex-wrap w-full sm:w-auto">
                                <button onClick={() => setShowFilters(s => !s)} className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors ${hasActiveFilters() ? 'bg-orange-500 text-white hover:bg-orange-600' : 'bg-gray-200 text-gray-800 hover:bg-gray-300'}`}>🔍 Filter{hasActiveFilters() ? ' •' : ''}</button>
                                <button onClick={() => setShowExportModal(true)} className="flex-1 sm:flex-none bg-blue-600 text-white px-3 py-2 rounded text-sm hover:bg-blue-700 transition-colors">📤 Export</button>
                                {canEdit && (
                                    <button onClick={() => setShowSeriesModal(true)} className="flex-1 sm:flex-none bg-purple-600 text-white px-3 py-2 rounded text-sm hover:bg-purple-700 transition-colors">🔄 Serie</button>
                                )}
                                {canEdit && (
                                    <button onClick={() => setShowAddModal(true)} className="flex-1 sm:flex-none bg-green-600 text-white px-3 py-2 rounded text-sm hover:bg-green-700 transition-colors">+ Termin</button>
                                )}
                                {FIREBASE_READY && (isEditor ? (
                                    <button onClick={handleLogout} className="flex-1 sm:flex-none bg-gray-700 text-white px-3 py-2 rounded text-sm hover:bg-gray-800 transition-colors">🔓 Abmelden</button>
                                ) : (
                                    <button onClick={() => setShowLoginModal(true)} className="flex-1 sm:flex-none bg-gray-200 text-gray-800 px-3 py-2 rounded text-sm hover:bg-gray-300 transition-colors">🔒 Anmelden</button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Filter Panel - einblendbar über den Filter-Button */}
                    {showFilters && (
                    <div className="bg-white rounded-lg shadow p-4 mb-4 no-print">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="font-medium text-sm flex items-center gap-2">
                                🔍 Filter
                                {hasActiveFilters() && (
                                    <span className="bg-orange-100 text-orange-800 px-2 py-0.5 rounded-full text-xs">
                                        Aktiv
                                    </span>
                                )}
                            </h3>
                            <div className="flex items-center gap-2">
                                {hasActiveFilters() && (
                                    <button
                                        onClick={clearFilters}
                                        className="bg-gray-500 text-white px-2 py-1 rounded text-xs hover:bg-gray-600 transition-colors"
                                    >
                                        Zurücksetzen
                                    </button>
                                )}
                                <button onClick={() => setShowFilters(false)} aria-label="Filter schließen" className="text-gray-500 hover:text-gray-700 text-xl leading-none">×</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div>
                                <label className="block text-xs font-medium mb-1">Platz</label>
                                <select 
                                    value={filters.field} 
                                    onChange={(e) => setFilters({...filters, field: e.target.value})}
                                    className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                >
                                    <option value="">Alle Plätze</option>
                                    {fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-medium mb-1">Typ</label>
                                <select 
                                    value={filters.type} 
                                    onChange={(e) => setFilters({...filters, type: e.target.value})}
                                    className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                >
                                    <option value="">Alle Typen</option>
                                    {Object.entries(eventTypes).map(([k, t]) => <option key={k} value={k}>{t.icon} {t.label}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-medium mb-1">Team</label>
                                <select 
                                    value={filters.team} 
                                    onChange={(e) => setFilters({...filters, team: e.target.value})}
                                    className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                >
                                    <option value="">Alle Teams</option>
                                    {teams.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>
                        </div>
                        {hasActiveFilters() && (
                            <div className="mt-3 text-sm text-gray-600">
                                Zeige {getFilteredEvents().length} von {events.length} Terminen
                            </div>
                        )}
                    </div>
                    )}

                    {/* Wochennavigation (in der mobilen Kalenderansicht ausgeblendet – dort scrollt man) */}
                    {!(isMobile && viewMode === 'calendar') && (
                    <div className="mb-4 flex items-center justify-between bg-white rounded-lg shadow p-3">
                        <div className="flex items-center gap-2 sm:gap-3">
                            <button onClick={() => setCurrentWeek(p => p - 1)} aria-label="Vorherige Woche" className="no-print bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded text-sm transition-colors">←</button>
                            <span className="font-medium text-sm">Woche vom {formatDate(getWeekStart(currentWeek))}</span>
                            <button onClick={() => setCurrentWeek(p => p + 1)} aria-label="Nächste Woche" className="no-print bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded text-sm transition-colors">→</button>
                        </div>
                        <button onClick={() => setCurrentWeek(0)} className="no-print hidden sm:block bg-green-600 text-white px-2 py-1 rounded text-xs hover:bg-green-700 transition-colors">Aktuelle Woche</button>
                    </div>
                    )}
                        </div>
                    </div>

                    {/* ===== SCROLLBARER MITTELBEREICH ===== */}
                    <div className="flex-1 overflow-y-auto print-overflow-visible">
                        <div className="max-w-7xl mx-auto px-4 py-3">

                    {/* Ladeanzeige beim Start */}
                    {!dataLoaded && (
                        <div className="bg-white rounded-lg shadow p-12 mb-4 text-center">
                            <div className="inline-block w-8 h-8 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
                            <p className="text-gray-500 text-sm mt-3">Plan wird geladen…</p>
                        </div>
                    )}

                    {/* Leerer Plan: freundlicher Hinweis */}
                    {dataLoaded && events.length === 0 && (
                        <div className="bg-white rounded-lg shadow p-8 mb-4 text-center">
                            <div className="text-5xl mb-3">📋</div>
                            <h3 className="font-bold text-lg mb-1">Noch keine Termine im Plan</h3>
                            <p className="text-gray-600 text-sm mb-4">
                                {canEdit
                                    ? 'Lege den ersten Trainings- oder Spieltermin an.'
                                    : 'Sobald Termine eingetragen sind, erscheinen sie hier. Zum Anlegen bitte anmelden.'}
                            </p>
                            <button
                                onClick={() => requireEditor() && setShowAddModal(true)}
                                className="bg-green-600 text-white px-4 py-2 rounded-md text-sm hover:bg-green-700 transition-colors"
                            >
                                {canEdit ? '+ Ersten Termin anlegen' : '🔒 Anmelden'}
                            </button>
                        </div>
                    )}

                    {/* Tabellenansicht */}
                    {dataLoaded && viewMode === 'table' && (
                        <div className="bg-white rounded-lg shadow overflow-x-auto print-overflow-visible">
                            <div className="flex border-b min-w-[1200px] print-min-0">
                                <div className="w-20 p-3 bg-gray-100 font-medium text-sm border-r">Zeit</div>
                                {getWeekDates(currentWeek).map(({ day, date, month, isToday }) => (
                                    <div key={day} className={`w-40 p-3 font-medium text-center text-sm border-r ${isToday ? 'bg-green-100' : 'bg-gray-100'}`}>
                                        <div>{day}{isToday && <span className="text-green-700 text-xs ml-1">• heute</span>}</div>
                                        <div className="text-xs text-gray-600">{date}.{month}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="relative">
                                {timeSlots.map(time => (
                                    <div key={time} className="flex border-b min-h-[60px] min-w-[1200px] print-min-0">
                                        <div className="w-20 p-3 bg-gray-50 border-r flex items-center text-sm font-medium">{time}</div>
                                        {weekdays.map(day => (
                                            <div key={day} className="w-40 border-r p-2 relative">
                                                {canEdit && !getFilteredEvents().some(e => e.day === day && e.time === time) && (
                                                    <div
                                                        className="no-print absolute inset-0 hover:bg-green-50 cursor-pointer opacity-30 hover:opacity-100 flex items-center justify-center transition-opacity"
                                                        onClick={() => { if (!requireEditor()) return; setNewEvent({...newEvent, day, time}); setShowAddModal(true); }}
                                                    >
                                                        <span className="text-gray-400 text-lg">+</span>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                                
                                {/* Event Blöcke */}
                                {weekdays.map((day, dayIndex) => {
                                    const eventPositions = getEventPositions(day);
                                    const maxColumns = Math.max(1, ...eventPositions.map(pos => pos.column + 1));
                                    
                                    return eventPositions.map(eventPos => {
                                        const eventType = eventTypes[eventPos.type];
                                        const field = fields.find(f => f.id === eventPos.field);
                                        
                                        const topPos = eventPos.startIndex * 60 + 4;
                                        const eventSlots = Math.ceil(eventPos.duration * 2); // Anzahl der 30-Minuten-Slots
                                        const height = eventSlots * 60 - 8; // 60px pro Slot, minus padding
                                        
                                        // Einfache und klare Positionierung
                                        const timeColumnWidth = 80; // w-20 = 80px
                                        const dayColumnWidth = 160; // w-40 = 160px  
                                        const dayStartX = timeColumnWidth + (dayIndex * dayColumnWidth);
                                        const availableWidth = dayColumnWidth - 8; // 8px padding (4px links + 4px rechts)
                                        
                                        let eventLeft = dayStartX + 4; // 4px padding von links
                                        let eventWidth = availableWidth;
                                        
                                        // Bei mehreren Spalten (verschiedene Plätze) verteilen
                                        if (maxColumns > 1) {
                                            const columnWidth = availableWidth / maxColumns;
                                            eventLeft = dayStartX + 4 + (eventPos.column * columnWidth);
                                            eventWidth = columnWidth - 4;
                                            
                                            // Sub-Position für gleichen Platz zur gleichen Zeit
                                            if (eventPos.groupSize > 1) {
                                                const subWidth = columnWidth / eventPos.groupSize;
                                                eventLeft += eventPos.positionInGroup * subWidth;
                                                eventWidth = subWidth - 2;
                                            }
                                        } else {
                                            // Nur eine Spalte - Events auf gleichem Platz teilen sich die volle Breite
                                            if (eventPos.groupSize > 1) {
                                                const subWidth = availableWidth / eventPos.groupSize;
                                                eventLeft += eventPos.positionInGroup * subWidth;
                                                eventWidth = subWidth - 2;
                                            }
                                        }
                                        
                                        // Position-Indikator für kleine Blöcke
                                        const positionObj = positions.find(p => p.value === eventPos.position);
                                        const positionIndicator = positionObj?.icon || '';
                                        
                                        // Entscheidung für kompakte Darstellung basierend auf verfügbarer Breite
                                        const isCompact = eventWidth < 120;
                                        
                                        return (
                                            <div
                                                key={eventPos.id}
                                                className={`${field?.color} border rounded shadow-sm cursor-pointer hover:shadow-md transition-shadow absolute z-10 text-xs overflow-hidden`}
                                                style={{ 
                                                    top: `${topPos}px`,
                                                    left: `${eventLeft}px`,
                                                    width: `${eventWidth}px`,
                                                    height: `${height}px`
                                                }}
                                                onClick={() => setEditingEvent({...eventPos})}
                                                onMouseEnter={(e) => handleEventHover(eventPos, e)}
                                                onMouseLeave={handleEventLeave}
                                                onMouseMove={(e) => {
                                                    if (hoveredEvent?.id === eventPos.id) {
                                                        setHoverPosition({ x: e.clientX, y: e.clientY });
                                                    }
                                                }}
                                            >
                                                {/* Typ-Header */}
                                                <div className={`${eventType.color} text-white text-xs px-1 py-1 rounded-t font-medium flex items-center justify-between`}>
                                                    <div className="flex items-center gap-1 truncate">
                                                        <span>{eventType.icon}</span>
                                                        {!isCompact && <span className="truncate">{eventType.label}</span>}
                                                    </div>
                                                    {positionIndicator && <span className="text-white font-bold">{positionIndicator}</span>}
                                                </div>
                                                
                                                {/* Event Content */}
                                                <div className="p-1 space-y-0.5">
                                                    {/* Jugend und Titel */}
                                                    <div className="font-bold text-gray-800 text-xs truncate">{eventPos.team}</div>
                                                    {!isCompact && <div className="font-medium text-gray-700 text-xs truncate">{eventPos.title}</div>}
                                                    
                                                    {/* Platz und Position - kompakt */}
                                                    <div className="text-gray-600 text-xs truncate">
                                                        📍 {isCompact ? field?.shortName : field?.name}
                                                        {eventPos.position && isCompact && ` (${positions.find(p => p.value === eventPos.position)?.short})`}
                                                        {eventPos.position && !isCompact && ` (${positions.find(p => p.value === eventPos.position)?.label})`}
                                                    </div>
                                                    
                                                    {/* Kabine - nur wenn nicht kompakt */}
                                                    {eventPos.cabin && !isCompact && (
                                                        <div className="text-gray-600 text-xs truncate">🚪 {eventPos.cabin}</div>
                                                    )}
                                                    
                                                    {/* Start- und Endzeit */}
                                                    <div className="text-gray-600 text-xs font-medium">
                                                        🕐 {eventPos.time} - {getEventEndTime(eventPos)}
                                                    </div>
                                                    
                                                    {/* Trainer - nur wenn nicht kompakt */}
                                                    {eventPos.trainer && !isCompact && (
                                                        <div className="text-gray-600 text-xs truncate">👨‍🏫 {eventPos.trainer}</div>
                                                    )}
                                                    
                                                    {/* Serie-Indikator - nur wenn nicht kompakt */}
                                                    {eventPos.isSeriesEvent && !isCompact && (
                                                        <div className="text-gray-500 text-xs">🔄 Serie</div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    });
                                })}
                            </div>
                        </div>
                    )}

                    {/* Kalenderansicht – Handy: durchgehend scrollbare Tagesliste */}
                    {dataLoaded && viewMode === 'calendar' && isMobile && (
                        <div className="space-y-2 print-overflow-visible">
                            {getUpcomingDays(42).map(({ date, dayName, dateNum, month, weekOffset, isToday }) => {
                                const dayEvents = getEventsForDay(dayName, weekOffset)
                                    .sort((a, b) => a.time.localeCompare(b.time));
                                return (
                                    <div key={date.toISOString()} className={`bg-white border rounded-lg ${isToday ? 'border-green-500 border-2' : 'border-gray-200'}`}>
                                        <div className={`p-2 text-sm rounded-t-lg flex items-center justify-between ${isToday ? 'bg-green-100' : 'bg-gray-100'}`}>
                                            <span className="font-medium">{dayName}, {dateNum}.{month}.</span>
                                            {isToday && <span className="text-xs text-green-700 font-bold">heute</span>}
                                        </div>
                                        <div className="p-2 space-y-1">
                                            {dayEvents.length === 0 && (
                                                <div className="text-xs text-gray-500 py-1">Keine Termine</div>
                                            )}
                                            {dayEvents.map(event => renderEventCard(event))}
                                            {canEdit && (
                                                <div className="no-print border-2 border-dashed border-gray-300 rounded p-2 text-center cursor-pointer hover:border-green-400 hover:bg-green-50 text-xs transition-colors" onClick={() => { setNewEvent({...newEvent, day: dayName}); setShowAddModal(true); }}>
                                                    + Hinzufügen
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* Kalenderansicht – Desktop/Tablet: Wochenraster */}
                    {dataLoaded && viewMode === 'calendar' && !isMobile && (
                        <div className="bg-white rounded-lg shadow p-2 print-overflow-visible">
                            <div className="grid grid-cols-7 gap-2">
                                {getWeekDates(currentWeek).map(({ day, date, month, isToday }) => (
                                    <div key={day} className={`border rounded-lg flex flex-col ${isToday ? 'border-green-500 border-2' : 'border-gray-200'}`}>
                                        <div className={`p-2 text-center text-sm rounded-t-lg ${isToday ? 'bg-green-100' : 'bg-gray-100'}`}>
                                            <span className="font-medium">{day}</span>
                                            <span className="text-xs text-gray-600 ml-1">{date}.{month}</span>
                                            {isToday && <span className="text-xs text-green-700 font-bold ml-1">• heute</span>}
                                        </div>
                                        <div className="p-2 space-y-1 flex-1 min-h-[60px]">
                                            {getFilteredEvents()
                                                .filter(e => e.day === day)
                                                .sort((a, b) => a.time.localeCompare(b.time))
                                                .map(event => renderEventCard(event))}
                                            {canEdit && (
                                                <div className="no-print border-2 border-dashed border-gray-300 rounded p-2 text-center cursor-pointer hover:border-green-400 hover:bg-green-50 text-xs transition-colors" onClick={() => { setNewEvent({...newEvent, day}); setShowAddModal(true); }}>
                                                    + Hinzufügen
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Platzübersicht - wie Excel */}
                    {dataLoaded && viewMode === 'fields' && (
                        <div className="bg-white rounded-lg shadow overflow-auto print-overflow-visible">
                            <table className="min-w-full print-min-0" style={{ minWidth: '1200px' }}>
                                {/* Header */}
                                <thead className="sticky top-0 z-20 bg-white">
                                    {/* Erste Zeile: Wochentage */}
                                    <tr>
                                        <th className="w-20 bg-gray-100 border-r-2 border-b border-gray-400"></th>
                                        {getWeekDates(currentWeek).map(({ day, date, month, isToday }, dayIndex) => (
                                            <th
                                                key={day}
                                                colSpan={fields.length}
                                                className={`text-center font-medium text-sm border-b border-gray-300 p-2 ${isToday ? 'bg-green-100' : 'bg-gray-200'} ${dayIndex < weekdays.length - 1 ? 'border-r-2 border-gray-600' : ''}`}
                                            >
                                                <div>{day}{isToday && <span className="text-green-700 text-xs ml-1">• heute</span>}</div>
                                                <div className="text-xs text-gray-600">{date}.{month}</div>
                                            </th>
                                        ))}
                                    </tr>
                                    
                                    {/* Zweite Zeile: Plätze */}
                                    <tr>
                                        <th className="w-20 bg-gray-100 border-r-2 border-b-2 border-gray-400"></th>
                                        {weekdays.map((day, dayIndex) => (
                                            <React.Fragment key={day}>
                                                {fields.map((field, fieldIndex) => (
                                                    <th 
                                                        key={`${day}-${field.id}`} 
                                                        className={`w-24 ${field.headerColor} text-white text-center py-1 text-xs font-medium border-b-2 border-gray-400 ${
                                                            fieldIndex < fields.length - 1 ? 'border-r border-gray-300' : ''
                                                        } ${
                                                            fieldIndex === fields.length - 1 && dayIndex < weekdays.length - 1 ? 'border-r-2 border-gray-600' : ''
                                                        }`}
                                                    >
                                                        {field.shortName}
                                                    </th>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                    </tr>
                                </thead>
                                
                                {/* Body: Zeitslots */}
                                <tbody>
                                    {timeSlots.map((time, timeIndex) => (
                                        <tr key={time}>
                                            {/* Zeit */}
                                            <td className={`w-20 bg-gray-50 border-r-2 border-gray-400 p-2 text-xs font-medium text-gray-600 text-center sticky left-0 z-10 ${timeIndex < timeSlots.length - 1 ? 'border-b' : ''} border-gray-300`}>
                                                {time}
                                            </td>
                                            
                                            {/* Events pro Tag und Platz */}
                                            {weekdays.map((day, dayIndex) => (
                                                <React.Fragment key={day}>
                                                    {fields.map((field, fieldIdx) => {
                                                        const slotEvents = getFilteredEvents().filter(e => 
                                                            e.day === day && 
                                                            e.field === field.id && 
                                                            e.time === time
                                                        );
                                                        
                                                        // Prüfe ob dieser Slot von einem längeren Event belegt ist
                                                        const occupyingEvent = getFilteredEvents().find(e => {
                                                            if (e.day !== day || e.field !== field.id) return false;

                                            <label className="block text-sm font-medium mb-1">Kabine</label>
                                            <select value={editingEvent.cabin} onChange={(e) => setEditingEvent({...editingEvent, cabin: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                <option value="">Wählen</option>
                                                {cabins.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Position</label>
                                            <select value={editingEvent.position || ''} onChange={(e) => setEditingEvent({...editingEvent, position: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {positions.map(p => <option key={p.value} value={p.value}>{p.icon} {p.label}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 p-6 border-t bg-gray-50">
                                    <button onClick={() => deleteEvent(editingEvent.id)} className="bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Löschen</button>
                                    <button onClick={() => setEditingEvent(null)} className="flex-1 bg-gray-300 hover:bg-gray-400 py-2 px-3 rounded-md text-sm transition-colors">Abbrechen</button>
                                    <button onClick={updateEvent} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Speichern</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Export */}
                    {showExportModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={(e) => { if (e.target === e.currentTarget) setShowExportModal(false); }}>
                            <div className="bg-white rounded-lg p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold">Export & Verwaltung</h2>
                                    <button onClick={() => setShowExportModal(false)} className="text-gray-500 hover:text-gray-700 text-xl">×</button>
                                </div>
                                <div className="space-y-3">
                                    <button onClick={() => { exportToCSV(); setShowExportModal(false); }} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        📄 CSV exportieren
                                    </button>
                                    <button onClick={() => { exportToJSON(); setShowExportModal(false); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        💾 Backup erstellen (JSON)
                                    </button>
                                    <div className="relative">
                                        <input 
                                            type="file" 
                                            accept=".json" 
                                            onChange={importFromJSON}
                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                            id="import-file"
                                        />
                                        <label 
                                            htmlFor="import-file" 
                                            className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2 cursor-pointer"
                                        >
                                            📂 Backup importieren
                                        </label>
                                    </div>
                                    <button onClick={() => { window.print(); setShowExportModal(false); }} className="w-full bg-gray-600 hover:bg-gray-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        🖨️ Drucken
                                    </button>
                                    <hr className="my-2" />
                                    <button onClick={() => { if(!requireEditor()) { setShowExportModal(false); return; } setShowExportModal(false); askConfirm('Wirklich ALLE Termine löschen?', () => { const previous = events; commitEvents([]); localStorage.removeItem('football-events'); addNotification('🗑️ Alle Termine gelöscht', 'info', { duration: 7000, action: { label: 'Rückgängig', onClick: () => { commitEvents(previous); addNotification('↩️ Termine wiederhergestellt', 'success'); } } }); }); }} className="w-full bg-red-600 hover:bg-red-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        🗑️ Alles löschen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Anmelden zum Bearbeiten */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={(e) => { if (e.target === e.currentTarget) setShowLoginModal(false); }}>
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-sm">
                                <div className="flex items-center justify-between p-4 border-b">
                                    <h2 className="text-lg font-bold">🔒 Zum Bearbeiten anmelden</h2>
                                    <button onClick={() => setShowLoginModal(false)} className="text-gray-500 hover:text-gray-700 text-xl">×</button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <p className="text-sm text-gray-600">Der Plan ist für alle sichtbar. Zum Hinzufügen oder Ändern von Terminen bitte das gemeinsame Passwort eingeben.</p>
                                    <input
                                        type="password"
                                        autoFocus
                                        value={loginPassword}
                                        onChange={(e) => setLoginPassword(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }}
                                        placeholder="Passwort"
                                        className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    />
                                    <button onClick={handleLogin} disabled={loggingIn} className="w-full bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white py-2 px-4 rounded-md transition-colors">
                                        {loggingIn ? 'Anmelden…' : 'Anmelden'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Bestätigung */}
                    {confirmDialog && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={(e) => { if (e.target === e.currentTarget) setConfirmDialog(null); }}>
                            <div className="bg-white rounded-lg shadow-xl w-full max-w-sm">
                                <div className="p-5">
                                    <h2 className="text-lg font-bold mb-2">Bestätigen</h2>
                                    <p className="text-sm text-gray-600">{confirmDialog.message}</p>
                                </div>
                                <div className="flex gap-3 p-4 border-t bg-gray-50">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-300 hover:bg-gray-400 py-2 px-3 rounded-md text-sm transition-colors">Abbrechen</button>
                                    <button onClick={() => { const cb = confirmDialog.onConfirm; setConfirmDialog(null); if (cb) cb(); }} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Bestätigen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notifications */}
                    <div className="fixed top-4 right-4 space-y-2 z-40">
                        {notifications.map(notification => (
                            <div key={notification.id} className={`p-3 rounded-lg shadow-lg relative transition-all duration-300 ${
                                notification.type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' :
                                notification.type === 'warning' ? 'bg-orange-100 text-orange-800 border border-orange-200' :
                                'bg-blue-100 text-blue-800 border border-blue-200'
                            }`}>
                                <button onClick={() => removeNotification(notification.id)} className="absolute top-1 right-2 text-gray-500 hover:text-gray-700 text-lg leading-none">×</button>
                                <div className="pr-6 text-sm">{notification.message}</div>
                                {notification.action && (
                                    <button
                                        onClick={() => { notification.action.onClick(); removeNotification(notification.id); }}
                                        className="mt-1 font-semibold text-sm underline hover:no-underline"
                                    >
                                        {notification.action.label}
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- PWA: Service Worker für Installierbarkeit & Offline-Nutzung -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((e) => console.error('Service Worker:', e));
            });
        }
    </script>
</body>
</html>
