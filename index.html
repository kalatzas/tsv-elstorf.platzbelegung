        const Icon = ({ name, className = 'w-4 h-4', spin = false }) => {

            return (

        const App = () => {
            const APP_VERSION = '2.9.0'; // SemVer: Major.Minor.Patch
            
            const [events, setEvents] = useState([]);
            const [closures, setClosures] = useState([]);
            const [showClosureModal, setShowClosureModal] = useState(false);
            const [isEditor, setIsEditor] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginPassword, setLoginPassword] = useState('');
            const [loggingIn, setLoggingIn] = useState(false);
            const [cloudStatus, setCloudStatus] = useState(FIREBASE_READY ? 'connecting' : 'local');
            const [dataLoaded, setDataLoaded] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingEvent, setEditingEvent] = useState(null);
            const [showExportModal, setShowExportModal] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [viewMode, setViewMode] = useState(() => (typeof window !== 'undefined' && window.innerWidth < 768) ? 'calendar' : 'table'); // table, calendar, fields
            const [headerStyle, setHeaderStyle] = useState('standard'); // Vorschau: 'standard' | 'a' | 'c'
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [showFilters, setShowFilters] = useState(false);
            const [isNarrowScreen, setIsNarrowScreen] = useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
            const [previewMobile, setPreviewMobile] = useState(false);
            const isMobile = isNarrowScreen || previewMobile;
            const [currentWeek, setCurrentWeek] = useState(0);
            const [hoveredEvent, setHoveredEvent] = useState(null);
            const [hoverPosition, setHoverPosition] = useState({ x: 0, y: 0 });
            const [filters, setFilters] = useState({
                field: '',
                type: '',
                team: ''
            });
            
            const fields = [
                { id: 'platz1', name: 'Platz 1', shortName: 'P1', color: 'bg-green-50 border-green-200', tint: 'bg-green-100', anchor: 'text-green-700', headerColor: 'bg-green-600' },
                { id: 'platz2', name: 'Platz 2', shortName: 'P2', color: 'bg-sky-50 border-sky-200', tint: 'bg-sky-100', anchor: 'text-sky-700', headerColor: 'bg-sky-600' },
                { id: 'platz3', name: 'Platz 3', shortName: 'P3', color: 'bg-amber-50 border-amber-200', tint: 'bg-amber-100', anchor: 'text-amber-700', headerColor: 'bg-amber-600' },
                { id: 'grundschule', name: 'Grundschule', shortName: 'GS', color: 'bg-rose-50 border-rose-200', tint: 'bg-rose-100', anchor: 'text-rose-700', headerColor: 'bg-rose-500' },
                { id: 'kunstrasen', name: 'Kunstrasen', shortName: 'KuRa', color: 'bg-violet-50 border-violet-200', tint: 'bg-violet-100', anchor: 'text-violet-700', headerColor: 'bg-violet-600' }
            ];

            const timeSlots = (() => {
                const slots = [];
                for (let h = 8; h <= 22; h++) {
                    slots.push(`${String(h).padStart(2, '0')}:00`);
                    if (h < 22) slots.push(`${String(h).padStart(2, '0')}:30`);
                }
                return slots;
            })();
            const weekdays = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            const teams = ['U8', 'U9', 'U10', 'U11', 'U12', 'U13', 'U14', 'U15', 'U16', 'U17', 'U18', 'U19'];
            const teamColors = {
                U8: '#ef4444', U9: '#eab308', U10: '#84cc16', U11: '#f97316',
                U12: '#06b6d4', U13: '#0d9488', U14: '#8b5cf6', U15: '#ec4899',
                U16: '#4f46e5', U17: '#10b981', U18: '#6366f1', U19: '#a855f7'
            };
            const cabins = ['Kabine 1', 'Kabine 2', 'Kabine 3', 'Kabine 4', 'Kabine 5'];
            const positions = [
                { value: '', label: 'Keine Angabe', short: '' },
                { value: 'li', label: 'Links', short: 'Li' },
                { value: 'mi', label: 'Mitte', short: 'Mi' },
                { value: 're', label: 'Rechts', short: 'Re' }
            ];

            const eventTypes = {
                training: { label: 'Training', color: 'bg-green-500', icon: 'activity', pill: 'bg-green-100 text-green-700' },
                match: { label: 'Pflichtspiel', color: 'bg-blue-500', icon: 'flag', pill: 'bg-blue-100 text-blue-700' },
                friendly: { label: 'Freundschaftsspiel', color: 'bg-yellow-500', icon: 'users', pill: 'bg-yellow-100 text-yellow-800' },
                cup: { label: 'Pokalspiel', color: 'bg-purple-500', icon: 'trophy', pill: 'bg-purple-100 text-purple-700' },
                makeup: { label: 'Nachholspiel', color: 'bg-red-500', icon: 'history', pill: 'bg-red-100 text-red-700' },
                blocked: { label: 'Platzsperre', color: 'bg-gray-600', icon: 'ban', pill: 'bg-gray-200 text-gray-700' }
            };

            const [newEvent, setNewEvent] = useState({
                field: '', day: '', time: '', duration: 1.5, type: 'training',
                team: '', title: '', cabin: [], trainer: '', position: '', isSeries: false, endDate: ''
            });

            const [newClosure, setNewClosure] = useState({ field: '', fromDate: '', toDate: '', reason: '' });
            const [trainers, setTrainers] = useState([]);
            const [showTrainerModal, setShowTrainerModal] = useState(false);
            const [newTrainerName, setNewTrainerName] = useState('');

            // Gefilterte Events
            const getFilteredEvents = () => {
                return events.filter(event => {
                    // Prüfe ob Event in der aktuellen Woche liegt
                    if (event.weekOffset !== undefined) {
                        // Für Serientermine: Prüfe ob sie in der aktuellen Woche liegen
                        if (event.weekOffset !== currentWeek) return false;
                    }
                    
                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    return true;
                });
            };

            // Termine eines bestimmten Wochentags in einer bestimmten Woche
            const getEventsForDay = (dayName, weekOffset) => {
                return events.filter(event => {
                    if (event.day !== dayName) return false;
                    if (event.weekOffset !== undefined && event.weekOffset !== weekOffset) return false;
                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    return true;
                });
            };

            // Liste kommender Tage ab heute (für die mobile Scroll-Ansicht)
            const getUpcomingDays = (count) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const thisMonday = getWeekStart(0);
                thisMonday.setHours(0, 0, 0, 0);
                const list = [];
                for (let i = 0; i < count; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    const dow = (d.getDay() + 6) % 7; // 0 = Montag
                    const dMonday = new Date(d);
                    dMonday.setDate(d.getDate() - dow);
                    const weekOffset = Math.round((dMonday - thisMonday) / (7 * 86400000));
                    list.push({
                        date: d,
                        dayName: weekdays[dow],
                        dateNum: d.getDate(),
                        month: d.getMonth() + 1,
                        weekOffset,
                        isToday: i === 0
                    });
                }
                return list;
            };

            // Hilfsfunktionen
            const getWeekStart = (weekOffset = 0) => {
                const today = new Date();
                const daysToMonday = today.getDay() === 0 ? 6 : today.getDay() - 1;
                const monday = new Date(today);
                monday.setDate(today.getDate() - daysToMonday + (weekOffset * 7));
                return monday;
            };

            const formatDate = (date) => date.toLocaleDateString('de-DE');

            // Datum als ISO-String (lokal, ohne Zeitzonen-Versatz): "2026-05-17"
            const toISODate = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            // ISO-Datum kurz darstellen: "2026-05-17" -> "17.05."
            const formatISODate = (iso) => {
                if (!iso) return '';
                const [, m, d] = iso.split('-');
                return `${d}.${m}.`;
            };

            const getWeekDates = (weekOffset = 0) => {
                const weekStart = getWeekStart(weekOffset);
                const today = new Date();
                return weekdays.map((day, index) => {
                    const date = new Date(weekStart);
                    date.setDate(weekStart.getDate() + index);
                    const isToday = date.getDate() === today.getDate()
                        && date.getMonth() === today.getMonth()
                        && date.getFullYear() === today.getFullYear();
                    return { day, date: date.getDate(), month: date.getMonth() + 1, isToday, iso: toISODate(date) };
                });
            };

            // Platzsperren, die ein bestimmtes Datum abdecken (optional auf einen Platz gefiltert)
            const closuresOnDate = (iso, fieldId) => {
                return closures.filter(c =>
                    c.fromDate <= iso && iso <= c.toDate &&
                    (fieldId ? c.field === fieldId : true)
                );
            };

            const getEventEndTime = (event) => {
                const startTime = parseFloat(event.time.replace(':', '.').replace('30', '5'));
                const endTime = startTime + event.duration;
                const hours = Math.floor(endTime);
                const minutes = (endTime - hours) * 60;
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            };

            // Startzeit als Dezimalstunden (z. B. "17:30" -> 17.5)
            const timeToHours = (time) => {
                const [h, m] = time.split(':').map(Number);
                return h + m / 60;
            };

            // Termine, die denselben Platz im selben Zeitraum belegen.
            // Geteilte Platzhälften (links/mitte/rechts) gelten nicht als Konflikt.
            const findConflicts = (candidate) => {
                if (!candidate.field || !candidate.day || !candidate.time) return [];
                const start = timeToHours(candidate.time);
                const end = start + candidate.duration;
                return events.filter(e => {
                    if (e.id === candidate.id) return false;
                    if (e.field !== candidate.field || e.day !== candidate.day) return false;
                    if (e.weekOffset !== undefined && candidate.weekOffset !== undefined
                        && e.weekOffset !== candidate.weekOffset) return false;
                    const eStart = timeToHours(e.time);
                    if (!(start < eStart + e.duration && eStart < end)) return false;
                    const sharable = e.type !== 'blocked' && candidate.type !== 'blocked'
                        && e.position && candidate.position && e.position !== candidate.position;
                    return !sharable;
                });
            };

            // Enthält der Sperrzeitraum mindestens einen bestimmten Wochentag? (0 = Montag)
            const closureCoversWeekday = (closure, dayIndex) => {
                const from = new Date(closure.fromDate + 'T00:00:00');
                const to = new Date(closure.toDate + 'T00:00:00');
                if ((to - from) / 86400000 >= 6) return true; // Zeitraum >= 7 Tage enthält jeden Wochentag
                for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
                    if (((d.getDay() + 6) % 7) === dayIndex) return true;
                }
                return false;
            };

            // Platzsperren, die mit einem (geplanten) Termin kollidieren
            const closuresForEvent = (candidate) => {
                if (!candidate.field || !candidate.day) return [];
                const fieldClosures = closures.filter(c => c.field === candidate.field);
                if (fieldClosures.length === 0) return [];
                if (candidate.eventDate) {
                    const iso = toISODate(new Date(candidate.eventDate));
                    return fieldClosures.filter(c => c.fromDate <= iso && iso <= c.toDate);
                }
                const dayIndex = weekdays.indexOf(candidate.day);
                return fieldClosures.filter(c => closureCoversWeekday(c, dayIndex));
            };

            // Hinweistext zur Konflikt-Warnung (blockt nicht, weist hin)
            const conflictMessage = (eventConflicts, closureConflicts, candidate) => {
                const field = fields.find(f => f.id === candidate.field);
                const parts = [];

                if (closureConflicts.length > 0) {
                    const c = closureConflicts[0];
                    const range = c.fromDate === c.toDate
                        ? formatISODate(c.fromDate)
                        : `${formatISODate(c.fromDate)} – ${formatISODate(c.toDate)}`;
                    parts.push(`${field?.name} ist gesperrt (${range}${c.reason ? ' · ' + c.reason : ''}).`);
                }

                if (eventConflicts.length > 0) {
                    const first = eventConflicts[0];
                    const firstLabel = first.type === 'blocked'
                        ? 'eine Platzsperre'
                        : `${first.team} (${eventTypes[first.type].label})`;
                    const more = eventConflicts.length > 1
                        ? ` (+${eventConflicts.length - 1} weitere Überschneidung${eventConflicts.length - 1 > 1 ? 'en' : ''})`
                        : '';
                    // Sonderregel: Pflichtspiel darf auf einem Trainings-Slot landen
                    const overriddenTraining = candidate.type === 'match'
                        && eventConflicts.find(c => c.type === 'training');
                    if (overriddenTraining) {
                        parts.push(`Das Pflichtspiel am ${candidate.day} um ${first.time}–${getEventEndTime(first)} Uhr `
                            + `überschneidet sich mit dem Training von ${overriddenTraining.team}. `
                            + `Pflichtspiele haben Vorrang – bitte das Trainerteam informieren und das Training verlegen.`);
                    } else {
                        parts.push(`${candidate.day}, ${first.time}–${getEventEndTime(first)} Uhr `
                            + `bereits belegt: ${firstLabel}.${more}`);
                    }
                }

                return parts.join(' ') + ' Termin trotzdem speichern?';
            };

            // Hover-Handler (auf Touch-Geräten kein Tooltip)
            const handleEventHover = (event, mouseEvent) => {
                if (isMobile) return;
                setHoveredEvent(event);
                setHoverPosition({
                    x: mouseEvent.clientX,
                    y: mouseEvent.clientY
                });
            };

            const handleEventLeave = () => {
                setHoveredEvent(null);
            };

            // Termin-Karte (Kalenderansicht – Desktop und Handy)
            // Platz-Kürzel als Anker-Element links, feste Team-Farbe als Punkt, Typ als Pille
            const renderEventCard = (event) => {
                const eventType = eventTypes[event.type];
                const field = fields.find(f => f.id === event.field);
                const isBlocked = event.type === 'blocked';
                return (
                    <div
                        key={event.id}
                        className="bg-white border border-gray-200 rounded-lg shadow-sm text-xs cursor-pointer hover:shadow transition-shadow flex overflow-hidden"
                        onClick={() => setEditingEvent({...event})}
                        onMouseEnter={(e) => handleEventHover(event, e)}
                        onMouseLeave={handleEventLeave}
                        onMouseMove={(e) => {
                            if (hoveredEvent?.id === event.id) {
                                setHoverPosition({ x: e.clientX, y: e.clientY });
                            }
                        }}
                    >
                        <div className={`${field?.tint || 'bg-gray-100'} flex items-center justify-center px-2`} style={{ minWidth: '46px' }}>
                            <span className={`${field?.anchor || 'text-gray-600'} font-extrabold text-base leading-none`}>{field?.shortName}</span>
                        </div>
                        <div className="flex-1 min-w-0 p-2 space-y-1">
                            <div className="flex items-start justify-between gap-1.5 flex-wrap">
                                <div className="flex items-center gap-1.5 min-w-0">
                                    <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: isBlocked ? '#6b7280' : (teamColors[event.team] || '#9ca3af') }}></span>
                                    <span className="text-sm font-bold text-gray-900 truncate leading-tight">{isBlocked ? 'Sperre' : event.team}</span>
                                </div>
                                <span className={`${eventType.pill} px-1.5 py-0.5 rounded-full font-semibold whitespace-nowrap shrink-0`} style={{ fontSize: '10px' }}>{eventType.label}</span>
                            </div>
                            <div className="space-y-0.5">
                                <div className="flex items-center gap-1 text-gray-700"><Icon name="clock" className="w-3 h-3" /> {event.time} – {getEventEndTime(event)}</div>
                                <div className="flex items-center gap-1 text-gray-600"><Icon name="mapPin" className="w-3 h-3" /> {field?.name}{event.position && ` (${positions.find(p => p.value === event.position)?.label})`}</div>
                                {event.trainer && <div className="flex items-center gap-1 text-gray-600"><Icon name="user" className="w-3 h-3" /> {event.trainer}</div>}
                                {cabinText(event.cabin) && <div className="flex items-center gap-1 text-gray-600"><Icon name="door" className="w-3 h-3" /> {cabinText(event.cabin)}</div>}
                            </div>
                        </div>
                    </div>
                );
            };

            // Hilfsfunktion für Event-Positionierung
            const getEventPositions = (day) => {
                const filteredEvents = getFilteredEvents();
                const dayEvents = filteredEvents.filter(e => e.day === day);
                const positions = [];
                
                dayEvents.forEach(event => {
                    const startIndex = timeSlots.indexOf(event.time);
                    if (startIndex === -1) return;
                    
                    const endIndex = startIndex + Math.ceil(event.duration * 2); // 30min pro Slot
                    
                    // Finde andere Events zur gleichen Zeit auf dem gleichen Platz
                    const sameTimeFieldEvents = dayEvents.filter(e => 
                        e.time === event.time && 
                        e.field === event.field &&
                        timeSlots.indexOf(e.time) !== -1
                    );
                    
                    // Sortiere Events nach Position (links, mitte, rechts)
                    sameTimeFieldEvents.sort((a, b) => {
                        const positionOrder = { 'li': 0, 'mi': 1, 're': 2, '': 3 };
                        const aOrder = positionOrder[a.position] !== undefined ? positionOrder[a.position] : 3;
                        const bOrder = positionOrder[b.position] !== undefined ? positionOrder[b.position] : 3;
                        return aOrder - bOrder;
                    });
                    
                    // Finde die Position dieses Events in der sortierten Liste
                    const positionInGroup = sameTimeFieldEvents.findIndex(e => e.id === event.id);
                    const groupSize = sameTimeFieldEvents.length;
                    
                    // Berechne Spalte basierend auf Zeit-Konflikten mit anderen Plätzen
                    let column = 0;
                    while (true) {
                        const conflict = positions.find(pos => 
                            pos.column === column &&
                            pos.startIndex < endIndex &&
                            pos.endIndex > startIndex &&
                            pos.field !== event.field // Nur Konflikte mit anderen Plätzen
                        );
                        
                        if (!conflict) break;
                        column++;
                    }
                    
                    positions.push({
                        ...event,
                        column,
                        startIndex,
                        endIndex,
                        positionInGroup,
                        groupSize
                    });
                });
                
                return positions;
            };

            const addNotification = (message, type = 'info', options = {}) => {
                const notification = { id: Date.now() + Math.random(), message, type, action: options.action };
                setNotifications(prev => [notification, ...prev.slice(0, 2)]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== notification.id)), options.duration || 5000);
            };

            const removeNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            // Bildschirmbreite überwachen (Handy vs. Desktop)
            useEffect(() => {
                const onResize = () => {
                    const mobile = window.innerWidth < 768;
                    setIsNarrowScreen(mobile);
                    if (mobile) setViewMode('calendar');
                };
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            // Tastaturhöhe auf dem Handy ermitteln, damit Dialoge nach oben rücken
            useEffect(() => {
                const vv = window.visualViewport;
                if (!vv) return;
                const update = () => {
                    const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
                    document.documentElement.style.setProperty('--kb-inset', `${inset}px`);
                };
                update();
                vv.addEventListener('resize', update);
                vv.addEventListener('scroll', update);
                return () => {
                    vv.removeEventListener('resize', update);
                    vv.removeEventListener('scroll', update);
                };
            }, []);

            // ESC-Taste Handler
            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setShowAddModal(false);
                        setShowExportModal(false);
                        setShowLoginModal(false);
                        setShowClosureModal(false);
                        setShowTrainerModal(false);
                        setConfirmDialog(null);
                        setEditingEvent(null);
                    }
                };
                
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);
            // Beispiel-Termine (nur für den lokalen Modus ohne Firebase)
            const EXAMPLE_EVENTS = [
                { id: 1, field: 'platz2', day: 'Montag', time: '17:00', duration: 1.5, type: 'training', team: 'U15', title: 'U15 Training', cabin: 'Kabine 1', trainer: 'Max Mustermann', position: 'mi' },
                { id: 2, field: 'platz1', day: 'Dienstag', time: '18:00', duration: 2, type: 'match', team: 'U16', title: 'U16 vs FC Hamburg', cabin: 'Kabine 2', trainer: 'Anna Schmidt', position: 'li' }
            ];

            // Daten laden: Firebase-Echtzeit-Sync oder lokaler Fallback
            useEffect(() => {
                if (!FIREBASE_READY) {
                    try {
                        const saved = localStorage.getItem('football-events');
                        setEvents(saved ? JSON.parse(saved) : EXAMPLE_EVENTS);
                        const savedClosures = localStorage.getItem('football-closures');
                        setClosures(savedClosures ? JSON.parse(savedClosures) : []);
                        const savedTrainers = localStorage.getItem('football-trainers');
                        setTrainers(savedTrainers ? JSON.parse(savedTrainers) : []);
                    } catch (e) {
                        console.error('Fehler beim Laden der Daten:', e);
                        setEvents(EXAMPLE_EVENTS);
                    }
                    setDataLoaded(true);
                    return;
                }
                const unsubData = planDoc().onSnapshot(
                    (snap) => {
                        const data = snap.exists ? snap.data() : null;
                        setEvents(data && Array.isArray(data.events) ? data.events : []);
                        setClosures(data && Array.isArray(data.closures) ? data.closures : []);
                        setTrainers(data && Array.isArray(data.trainers) ? data.trainers : []);
                        setCloudStatus(snap.metadata.fromCache ? 'offline' : 'online');
                        setDataLoaded(true);
                    },
                    (err) => {
                        console.error('Firestore-Fehler:', err);
                        setCloudStatus('error');
                        setDataLoaded(true);
                        addNotification('Cloud-Verbindung fehlgeschlagen', 'warning');
                    }
                );
                const unsubAuth = auth.onAuthStateChanged((user) => setIsEditor(!!user));
                return () => { unsubData(); unsubAuth(); };
            }, []);

            // Lokaler Fallback: in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && events.length > 0) {
                    try {
                        localStorage.setItem('football-events', JSON.stringify(events));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Daten:', e);
                        addNotification('Daten konnten nicht gespeichert werden', 'warning');
                    }
                }
            }, [events]);

            // Lokaler Fallback: Platzsperren in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && dataLoaded) {
                    try {
                        localStorage.setItem('football-closures', JSON.stringify(closures));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Platzsperren:', e);
                    }
                }
            }, [closures, dataLoaded]);

            // Lokaler Fallback: Trainerliste in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && dataLoaded) {
                    try {
                        localStorage.setItem('football-trainers', JSON.stringify(trainers));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Trainerliste:', e);
                    }
                }
            }, [trainers, dataLoaded]);

            // Termine speichern: lokal sofort, in der Cloud für alle
            const commitEvents = (next) => {
                setEvents(next);
                if (FIREBASE_READY) {
                    planDoc().set({ events: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Platzsperren speichern: lokal sofort, in der Cloud für alle
            const commitClosures = (next) => {
                setClosures(next);
                if (FIREBASE_READY) {
                    planDoc().set({ closures: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Trainerliste speichern: lokal sofort, in der Cloud für alle
            const commitTrainers = (next) => {
                setTrainers(next);
                if (FIREBASE_READY) {
                    planDoc().set({ trainers: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Kabinen-Anzeige (Mehrfachauswahl als Liste, Altdaten als Text)
            const cabinText = (cabin) => Array.isArray(cabin) ? cabin.join(', ') : (cabin || '');

            // Darf der aktuelle Nutzer bearbeiten?
            const canEdit = !FIREBASE_READY || isEditor;

            // Prüft, ob bearbeitet werden darf; sonst Anmelde-Dialog
            const requireEditor = () => {
                if (canEdit) return true;
                setShowLoginModal(true);
                return false;
            };

            // App-eigener Bestätigungsdialog statt window.confirm
            const askConfirm = (message, onConfirm) => setConfirmDialog({ message, onConfirm });

            const handleLogin = () => {
                if (!FIREBASE_READY) {
                    addNotification('Firebase ist noch nicht konfiguriert', 'warning');
                    return;
                }
                if (!loginPassword) return;
                setLoggingIn(true);
                auth.signInWithEmailAndPassword(EDITOR_EMAIL, loginPassword)
                    .then(() => {
                        setShowLoginModal(false);
                        setLoginPassword('');
                        addNotification('Bearbeiten freigeschaltet', 'success');
                    })
                    .catch(() => addNotification('Falsches Passwort', 'warning'))
                    .finally(() => setLoggingIn(false));
            };

            const handleLogout = () => {
                if (FIREBASE_READY && auth) auth.signOut();
                addNotification('Bearbeiten gesperrt', 'info');
            };

            const validateEvent = (event) => {
                if (event.type === 'blocked') {
                    // Für Platzsperren nur Platz, Tag und Zeit erforderlich
                    if (!event.field || !event.day || !event.time) {
                        return 'Bitte Platz, Tag und Zeit auswählen!';
                    }
                } else {
                    // Pflichtfelder: Platz, Tag, Zeit, Team (Gegner ist optional)
                    if (!event.field || !event.day || !event.time || !event.team) {
                        return 'Bitte alle Pflichtfelder ausfüllen!';
                    }
                }
                return null;
            };

            const addEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(newEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                
                const isSeries = !!newEvent.isSeries;

                const eventToAdd = {...newEvent};
                delete eventToAdd.isSeries;
                delete eventToAdd.endDate;
                if (eventToAdd.type === 'blocked') {
                    eventToAdd.team = 'SPERRE';
                    if (!eventToAdd.title) {
                        eventToAdd.title = 'Platzsperre';
                    }
                }

                // Serientermine im Voraus erzeugen (wöchentlich bis zum Enddatum)
                let seriesEvents = null;
                if (isSeries) {
                    if (!newEvent.endDate) {
                        addNotification('Bitte ein Enddatum für die Serie wählen!', 'warning');
                        return;
                    }
                    const baseDate = getWeekStart(currentWeek);
                    const dayIndex = weekdays.indexOf(eventToAdd.day);
                    const end = new Date(newEvent.endDate + 'T23:59:59');
                    seriesEvents = [];
                    for (let week = 0; week < 60; week++) {
                        const eventDate = new Date(baseDate);
                        eventDate.setDate(baseDate.getDate() + dayIndex + (week * 7));
                        if (eventDate > end) break;
                        seriesEvents.push({ ...eventToAdd, id: Date.now() + week, isSeriesEvent: true, weekOffset: week, eventDate: eventDate.toISOString() });
                    }
                    if (seriesEvents.length === 0) {
                        addNotification('Im gewählten Zeitraum liegt kein Termin – bitte Enddatum prüfen.', 'warning');
                        return;
                    }
                }

                const commit = () => {
                    if (isSeries) {
                        commitEvents([...events, ...seriesEvents]);
                        addNotification(`${seriesEvents.length} Serientermine erstellt`, 'success');
                    } else {
                        commitEvents([...events, { ...eventToAdd, id: Date.now() }]);
                        addNotification('Termin hinzugefügt', 'success');
                    }
                    setNewEvent({ field: '', day: '', time: '', duration: 1.5, type: 'training', team: '', title: '', cabin: [], trainer: '', position: '', isSeries: false, endDate: '' });
                    setShowAddModal(false);
                };

                if (!isSeries) {
                    const eventConflicts = findConflicts(eventToAdd);
                    const closureConflicts = closuresForEvent(eventToAdd);
                    if (eventConflicts.length > 0 || closureConflicts.length > 0) {
                        askConfirm(conflictMessage(eventConflicts, closureConflicts, eventToAdd), commit);
                        return;
                    }
                }
                commit();
            };

            const updateEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(editingEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                const commit = () => {
                    commitEvents(events.map(e => e.id === editingEvent.id ? editingEvent : e));
                    setEditingEvent(null);
                    addNotification('Termin aktualisiert', 'success');
                };

                const eventConflicts = findConflicts(editingEvent);
                const closureConflicts = closuresForEvent(editingEvent);
                if (eventConflicts.length > 0 || closureConflicts.length > 0) {
                    askConfirm(conflictMessage(eventConflicts, closureConflicts, editingEvent), commit);
                } else {
                    commit();
                }
            };

            const deleteEvent = (id) => {
                if (!requireEditor()) return;
                askConfirm('Diesen Termin wirklich löschen?', () => {
                    const previous = events;
                    commitEvents(events.filter(e => e.id !== id));
                    setEditingEvent(null); // Modal schließen
                    addNotification('Termin gelöscht', 'info', {
                        duration: 7000,
                        action: {
                            label: 'Rückgängig',
                            onClick: () => { commitEvents(previous); addNotification('Termin wiederhergestellt', 'success'); }
                        }
                    });
                });
            };

            const addClosure = () => {
                if (!requireEditor()) return;
                if (!newClosure.field || !newClosure.fromDate) {
                    addNotification('Bitte Platz und Von-Datum auswählen!', 'warning');
                    return;
                }
                const toDate = newClosure.toDate || newClosure.fromDate;
                if (toDate < newClosure.fromDate) {
                    addNotification('Das Bis-Datum darf nicht vor dem Von-Datum liegen!', 'warning');
                    return;
                }
                commitClosures([...closures, { ...newClosure, toDate, id: Date.now() }]);
                setNewClosure({ field: '', fromDate: '', toDate: '', reason: '' });
                addNotification('Platzsperre eingetragen', 'success');
            };

            const deleteClosure = (id) => {
                if (!requireEditor()) return;
                askConfirm('Diese Platzsperre wirklich aufheben?', () => {
                    const previous = closures;
                    commitClosures(closures.filter(c => c.id !== id));
                    addNotification('Platzsperre aufgehoben', 'info', {
                        duration: 7000,
                        action: {
                            label: 'Rückgängig',
                            onClick: () => { commitClosures(previous); addNotification('Platzsperre wiederhergestellt', 'success'); }
                        }
                    });
                });
            };

            const addTrainer = () => {
                if (!requireEditor()) return;
                const name = newTrainerName.trim();
                if (!name) return;
                if (trainers.some(t => t.toLowerCase() === name.toLowerCase())) {
                    addNotification('Diesen Trainer gibt es bereits', 'warning');
                    return;
                }
                commitTrainers([...trainers, name].sort((a, b) => a.localeCompare(b)));
                setNewTrainerName('');
                addNotification('Trainer hinzugefügt', 'success');
            };

            const deleteTrainer = (name) => {
                if (!requireEditor()) return;
                commitTrainers(trainers.filter(t => t !== name));
            };

            const exportToCSV = () => {
                const headers = ['Platz', 'Tag', 'Zeit', 'Dauer', 'Typ', 'Team', 'Gegner', 'Trainer', 'Kabine', 'Position'];
                const csv = [
                    headers.join(','),
                    ...events.map(e => [
                        fields.find(f => f.id === e.field)?.name || '',
                        e.day, e.time, e.duration, eventTypes[e.type].label,
                        e.team, e.title || '', e.trainer || '', cabinText(e.cabin),
                        positions.find(p => p.value === e.position)?.label || ''
                    ].map(field => `"${field}"`).join(','))
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'termine.csv';
                a.click();
                URL.revokeObjectURL(url);
                addNotification('CSV exportiert', 'success');
            };

            const exportToJSON = () => {
                const dataStr = JSON.stringify(events, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `termine_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                addNotification('Backup erstellt', 'success');
            };

            const importFromJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!requireEditor()) { event.target.value = ''; return; }

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedEvents = JSON.parse(e.target.result);
                        if (Array.isArray(importedEvents)) {
                            commitEvents(importedEvents);
                            addNotification('Daten importiert', 'success');
                        } else {
                            addNotification('Ungültiges Dateiformat', 'warning');
                        }
                    } catch (error) {
                        addNotification('Fehler beim Importieren', 'warning');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const clearFilters = () => {
                setFilters({ field: '', type: '', team: '' });
            };

            const hasActiveFilters = () => {
                return filters.field || filters.type || filters.team;
            };

            const todayISO = toISODate(new Date());

            // Vorschau: Tageskopf in verschiedenen Designvarianten
            const renderMobileDayHeader = (dayName, dateNum, month, isToday) => {
                if (headerStyle === 'a') {
                    return (
                        <div className="px-3 py-2.5 rounded-t-lg bg-white flex items-center justify-between border-b border-gray-100">
                            <div className="flex items-center gap-2.5">
                                <span className={`w-1.5 h-5 rounded-full ${isToday ? 'bg-green-600' : 'bg-slate-400'}`}></span>
                                <span className="text-sm"><span className="font-bold text-slate-900">{dayName}</span> <span className="text-slate-500">{dateNum}.{month}.</span></span>
                            </div>
                            {isToday && <span className="text-xs bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded-full">heute</span>}
                        </div>
                    );
                }
                if (headerStyle === 'c') {
                    return (
                        <div className="px-3 py-2.5 rounded-t-lg bg-white flex items-center justify-between border-b border-gray-100">
                            <span className="text-sm font-bold text-slate-900">{dayName} {dateNum}.{month}.</span>
                            {isToday && <span className="text-xs bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded-full">heute</span>}
                        </div>
                    );
                }
                return (
                    <div className={`p-2 text-sm rounded-t-lg flex items-center justify-between ${isToday ? 'bg-green-100' : 'bg-gray-100'}`}>
                        <span className="font-medium">{dayName}, {dateNum}.{month}.</span>
                        {isToday && <span className="text-xs text-green-700 font-bold">heute</span>}
                    </div>
                );
            };

            // Platzsperren-Hinweis innerhalb eines Tages
            const renderDayClosures = (iso) => {
                const dayClosures = closuresOnDate(iso);

                    </div>

                                {/* Event Blöcke */}

                                    const eventPositions = getEventPositions(day);
                                    const maxColumns = Math.max(1, ...eventPositions.map(pos => pos.column + 1));
                                    
                                    return eventPositions.map(eventPos => {
                                        const eventType = eventTypes[eventPos.type];
                                        const field = fields.find(f => f.id === eventPos.field);
                                        
                                        const topPos = eventPos.startIndex * 60 + 4;
                                        const eventSlots = Math.ceil(eventPos.duration * 2); // Anzahl der 30-Minuten-Slots
                                        const height = eventSlots * 60 - 8; // 60px pro Slot, minus padding
                                        
                                        // Einfache und klare Positionierung
                                        const timeColumnWidth = 80; // w-20 = 80px
                                        const dayColumnWidth = 160; // w-40 = 160px  
                                        const dayStartX = timeColumnWidth + (dayIndex * dayColumnWidth);
                                        const availableWidth = dayColumnWidth - 8; // 8px padding (4px links + 4px rechts)
                                        
                                        let eventLeft = dayStartX + 4; // 4px padding von links
                                        let eventWidth = availableWidth;
                                        
                                        // Bei mehreren Spalten (verschiedene Plätze) verteilen
                                        if (maxColumns > 1) {
                                            const columnWidth = availableWidth / maxColumns;
                                            eventLeft = dayStartX + 4 + (eventPos.column * columnWidth);
                                            eventWidth = columnWidth - 4;
                                            
                                            // Sub-Position für gleichen Platz zur gleichen Zeit
                                            if (eventPos.groupSize > 1) {
                                                const subWidth = columnWidth / eventPos.groupSize;
                                                eventLeft += eventPos.positionInGroup * subWidth;
                                                eventWidth = subWidth - 2;
                                            }
                                        } else {
                                            // Nur eine Spalte - Events auf gleichem Platz teilen sich die volle Breite
                                            if (eventPos.groupSize > 1) {
                                                const subWidth = availableWidth / eventPos.groupSize;
                                                eventLeft += eventPos.positionInGroup * subWidth;
                                                eventWidth = subWidth - 2;
                                            }
                                        }
                                        
                                        // Position-Indikator für kleine Blöcke
                                        const positionObj = positions.find(p => p.value === eventPos.position);
                                        const positionIndicator = positionObj?.short || '';

                                                    left: `${eventLeft}px`,
                                                    width: `${eventWidth}px`,
                                                    height: `${height}px`
                                                }}

                                                onMouseEnter={(e) => handleEventHover(eventPos, e)}
                                                onMouseLeave={handleEventLeave}
                                                onMouseMove={(e) => {

                                                    }

                                                        {!isCompact && <span className="truncate">{eventType.label}</span>}

                                                        {eventPos.position && !isCompact && ` (${positions.find(p => p.value === eventPos.position)?.label})`}
                                                    </div>

                                                    {/* Kabine - nur wenn nicht kompakt */}
                                                    {cabinText(eventPos.cabin) && !isCompact && (
                                                        <div className="flex items-center gap-1 text-gray-600 text-xs truncate"><Icon name="door" className="w-3 h-3" /> {cabinText(eventPos.cabin)}</div>
                                                    )}

                                                    <div className="flex items-center gap-1 text-gray-600 text-xs font-medium">
                                                        <Icon name="clock" className="w-3 h-3" /> {eventPos.time} – {getEventEndTime(eventPos)}

                                                    {/* Trainer - nur wenn nicht kompakt */}

                                                    )}
                                                </div>
                                            </div>
                                        );
                                    });
                                })}
                            </div>
                        </div>

                                                    + Hinzufügen

                                            {weekdays.map((day, dayIndex) => (
                                                <React.Fragment key={day}>
                                                    {fields.map((field, fieldIdx) => {

                                                            e.day === day && 
                                                            e.field === field.id && 
                                                            e.time === time
                                                        );
                                                        
                                                        // Prüfe ob dieser Slot von einem längeren Event belegt ist
                                                        const occupyingEvent = getFilteredEvents().find(e => {
                                                            if (e.day !== day || e.field !== field.id) return false;
                                                            const eventStartIdx = timeSlots.indexOf(e.time);
                                                            const eventEndIdx = eventStartIdx + Math.ceil(e.duration * 2);
                                                            return eventStartIdx <= timeIndex && timeIndex < eventEndIdx;

                                                        // Ist dies der Start eines Events?
                                                        const isEventStart = slotEvents.length > 0;
                                                        const isOccupied = occupyingEvent && !isEventStart;
                                                        
                                                        return (
                                                            <td

                                                                className={`w-24 h-10 ${timeIndex < timeSlots.length - 1 ? 'border-b' : ''} border-gray-300 ${

                                                                                left: '2px',
                                                                                right: '2px',

                                                                                    <div className="truncate text-xs opacity-90">
                                                                                        {event.trainer}

                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                    );

                                                                            +
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    ))}
                                </tbody>

                    {/* Modal: Termin bearbeiten */}
                    {editingEvent && (
                        <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50" onClick={(e) => { if (e.target === e.currentTarget) setEditingEvent(null); }}>
                            <div className="bg-white rounded-t-2xl sm:rounded-lg w-full max-w-md max-h-[calc(92vh_-_var(--kb-inset))] sm:max-h-[90vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center p-6 border-b">
                                    <h2 className="text-lg font-bold">Termin bearbeiten</h2>
                                    <button onClick={() => setEditingEvent(null)} className="text-gray-500 hover:text-gray-700 text-xl">×</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Platz</label>
                                            <select value={editingEvent.field} onChange={(e) => setEditingEvent({...editingEvent, field: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Tag</label>
                                            <select value={editingEvent.day} onChange={(e) => setEditingEvent({...editingEvent, day: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {weekdays.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Zeit</label>
                                            <select value={editingEvent.time} onChange={(e) => setEditingEvent({...editingEvent, time: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {timeSlots.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Dauer</label>
                                            <input type="number" step="0.5" min="0.5" max="3" value={editingEvent.duration} onChange={(e) => setEditingEvent({...editingEvent, duration: parseFloat(e.target.value) || 1.5})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Typ</label>
                                            <select value={editingEvent.type} onChange={(e) => setEditingEvent({...editingEvent, type: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {Object.entries(eventTypes).map(([k, t]) => <option key={k} value={k}>{t.label}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Team</label>
                                            <select value={editingEvent.team} onChange={(e) => setEditingEvent({...editingEvent, team: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {teams.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        {(editingEvent.type === 'match' || editingEvent.type === 'friendly' || editingEvent.type === 'cup') && (
                                            <div>
                                                <label className="block text-sm font-medium mb-1">Gegner</label>
                                                <input type="text" value={editingEvent.title || ''} onChange={(e) => setEditingEvent({...editingEvent, title: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="z.B. FC Hamburg" />
                                            </div>
                                        )}
                                        <div>
                                            <div className="flex items-center justify-between mb-1">
                                                <label className="text-sm font-medium">Trainer</label>
                                                {canEdit && <button type="button" onClick={() => setShowTrainerModal(true)} className="text-xs text-blue-700 hover:underline">Trainer verwalten</button>}
                                            </div>
                                            <select value={editingEvent.trainer || ''} onChange={(e) => setEditingEvent({...editingEvent, trainer: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                <option value="">Wählen</option>
                                                {editingEvent.trainer && !trainers.includes(editingEvent.trainer) && <option value={editingEvent.trainer}>{editingEvent.trainer}</option>}
                                                {trainers.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Kabinen</label>
                                            <div className="grid grid-cols-2 gap-1.5">
                                                {cabins.map(c => {
                                                    const sel = Array.isArray(editingEvent.cabin) ? editingEvent.cabin : (editingEvent.cabin ? [editingEvent.cabin] : []);
                                                    const checked = sel.includes(c);
                                                    return (
                                                        <label key={c} className={`flex items-center gap-2 text-sm border rounded-md p-2 cursor-pointer ${checked ? 'bg-blue-50 border-blue-300' : ''}`}>
                                                            <input
                                                                type="checkbox"
                                                                checked={checked}
                                                                onChange={(e) => setEditingEvent({...editingEvent, cabin: e.target.checked ? [...sel, c] : sel.filter(x => x !== c)})}
                                                                className="w-4 h-4 accent-blue-600"
                                                            />
                                                            {c}
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1">Position</label>
                                            <select value={editingEvent.position || ''} onChange={(e) => setEditingEvent({...editingEvent, position: e.target.value})} className="w-full border rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                {positions.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 p-6 border-t bg-gray-50">
                                    <button onClick={() => deleteEvent(editingEvent.id)} className="bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Löschen</button>
                                    <button onClick={() => setEditingEvent(null)} className="flex-1 bg-gray-300 hover:bg-gray-400 py-2 px-3 rounded-md text-sm transition-colors">Abbrechen</button>
                                    <button onClick={updateEvent} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Speichern</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Export */}
                    {showExportModal && (
                        <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50" onClick={(e) => { if (e.target === e.currentTarget) setShowExportModal(false); }}>
                            <div className="bg-white rounded-t-2xl sm:rounded-lg p-6 max-w-md w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold">Export & Verwaltung</h2>
                                    <button onClick={() => setShowExportModal(false)} className="text-gray-500 hover:text-gray-700 text-xl">×</button>
                                </div>
                                <div className="space-y-3">
                                    <button onClick={() => { exportToCSV(); setShowExportModal(false); }} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        <Icon name="file" /> CSV exportieren
                                    </button>
                                    <button onClick={() => { exportToJSON(); setShowExportModal(false); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        <Icon name="hardDrive" /> Backup erstellen (JSON)
                                    </button>
                                    <div className="relative">
                                        <input 
                                            type="file" 
                                            accept=".json" 
                                            onChange={importFromJSON}
                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                            id="import-file"
                                        />
                                        <label 
                                            htmlFor="import-file" 
                                            className="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2 cursor-pointer"
                                        >
                                            <Icon name="download" /> Backup importieren
                                        </label>
                                    </div>
                                    <button onClick={() => { window.print(); setShowExportModal(false); }} className="w-full bg-gray-600 hover:bg-gray-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        <Icon name="printer" /> Drucken
                                    </button>
                                    <hr className="my-2" />
                                    <button onClick={() => { if(!requireEditor()) { setShowExportModal(false); return; } setShowExportModal(false); askConfirm('Wirklich ALLE Termine löschen?', () => { const previous = events; commitEvents([]); localStorage.removeItem('football-events'); addNotification('Alle Termine gelöscht', 'info', { duration: 7000, action: { label: 'Rückgängig', onClick: () => { commitEvents(previous); addNotification('Termine wiederhergestellt', 'success'); } } }); }); }} className="w-full bg-red-600 hover:bg-red-700 text-white py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                                        <Icon name="trash" /> Alles löschen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Anmelden zum Bearbeiten */}
                    {showLoginModal && (
                        <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50" onClick={(e) => { if (e.target === e.currentTarget) setShowLoginModal(false); }}>
                            <div className="bg-white rounded-t-2xl sm:rounded-lg shadow-xl w-full max-w-sm">
                                <div className="flex items-center justify-between p-4 border-b">
                                    <h2 className="text-lg font-bold flex items-center gap-2"><Icon name="lock" className="w-5 h-5" /> Zum Bearbeiten anmelden</h2>
                                    <button onClick={() => setShowLoginModal(false)} className="text-gray-500 hover:text-gray-700 text-xl">×</button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <p className="text-sm text-gray-600">Der Plan ist für alle sichtbar. Zum Hinzufügen oder Ändern von Terminen bitte das gemeinsame Passwort eingeben.</p>
                                    <input
                                        type="password"
                                        autoFocus
                                        value={loginPassword}
                                        onChange={(e) => setLoginPassword(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }}
                                        placeholder="Passwort"
                                        className="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    />
                                    <button onClick={handleLogin} disabled={loggingIn} className="w-full bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white py-2 px-4 rounded-md transition-colors">
                                        {loggingIn ? 'Anmelden…' : 'Anmelden'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Bestätigung */}
                    {confirmDialog && (
                        <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50" onClick={(e) => { if (e.target === e.currentTarget) setConfirmDialog(null); }}>
                            <div className="bg-white rounded-t-2xl sm:rounded-lg shadow-xl w-full max-w-sm">
                                <div className="p-5">
                                    <h2 className="text-lg font-bold mb-2">Bestätigen</h2>
                                    <p className="text-sm text-gray-600">{confirmDialog.message}</p>
                                </div>
                                <div className="flex gap-3 p-4 border-t bg-gray-50">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-300 hover:bg-gray-400 py-2 px-3 rounded-md text-sm transition-colors">Abbrechen</button>
                                    <button onClick={() => { const cb = confirmDialog.onConfirm; setConfirmDialog(null); if (cb) cb(); }} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 px-3 rounded-md text-sm transition-colors">Bestätigen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Umschalter: Mobil-Vorschau auf dem Desktop */}
                    {!isNarrowScreen && (
                        <button
                            onClick={() => { const next = !previewMobile; setPreviewMobile(next); if (next) setViewMode('calendar'); }}
                            className="no-print fixed bottom-4 left-4 z-50 bg-slate-800 text-white text-xs font-medium px-3 py-2 rounded-full shadow-lg flex items-center gap-1.5 hover:bg-slate-700 transition-colors"
                        >
                            <Icon name={previewMobile ? 'monitor' : 'smartphone'} className="w-4 h-4" />
                            {previewMobile ? 'Desktop-Ansicht' : 'Mobil-Vorschau'}
                        </button>
                    )}

                    {/* Notifications */}
                    <div className="fixed top-4 right-4 space-y-2 z-40">
                        {notifications.map(notification => (
                            <div key={notification.id} className={`p-3 rounded-lg shadow-lg relative transition-all duration-300 ${
                                notification.type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' :
                                notification.type === 'warning' ? 'bg-orange-100 text-orange-800 border border-orange-200' :
                                'bg-blue-100 text-blue-800 border border-blue-200'
                            }`}>
                                <button onClick={() => removeNotification(notification.id)} aria-label="Schließen" className="absolute top-1 right-1.5 text-gray-500 hover:text-gray-700"><Icon name="close" className="w-4 h-4" /></button>
                                <div className="pr-6 flex items-start gap-2">
                                    <Icon name={notification.type === 'success' ? 'check' : notification.type === 'warning' ? 'alert' : 'info'} className="w-4 h-4 mt-0.5 shrink-0" />
                                    <div className="text-sm">{notification.message}</div>
                                </div>
                                {notification.action && (
                                    <button
                                        onClick={() => { notification.action.onClick(); removeNotification(notification.id); }}
                                        className="mt-1 ml-6 font-semibold text-sm underline hover:no-underline"
                                    >
                                        {notification.action.label}
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- PWA: Service Worker für Installierbarkeit & Offline-Nutzung -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((e) => console.error('Service Worker:', e));
            });
        }
    </script>
</body>
</html>
