            return (

                    {inner}
                </svg>
            );
        };

        // Datumsauswahl im deutschen Format (TT.MM.JJJJ), Woche ab Montag.
        // Wert/onChange arbeiten mit ISO-Strings "JJJJ-MM-TT".
        const DateField = ({ value, onChange, min, className = '' }) => {
            const [open, setOpen] = useState(false);
            const MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
            const WD = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
            const pad = (n) => String(n).padStart(2, '0');
            const toIso = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
            const fmt = (iso) => { if (!iso) return ''; const [y, m, d] = iso.split('-'); return `${d}.${m}.${y}`; };
            const today = new Date();
            const base = value ? new Date(value + 'T00:00:00') : today;
            const [view, setView] = useState({ y: base.getFullYear(), m: base.getMonth() });
            const first = new Date(view.y, view.m, 1);
            const startDow = (first.getDay() + 6) % 7;
            const daysInMonth = new Date(view.y, view.m + 1, 0).getDate();
            const cells = [];
            for (let i = 0; i < startDow; i++) cells.push(null);
            for (let d = 1; d <= daysInMonth; d++) cells.push(d);
            const todayIso = toIso(today.getFullYear(), today.getMonth(), today.getDate());
            return (
                <div className="relative">
                    <button type="button" onClick={() => setOpen(o => !o)} className={`${className} text-left flex items-center justify-between gap-2`}>
                        <span className={value ? '' : 'text-gray-400'}>{value ? fmt(value) : 'TT.MM.JJJJ'}</span>
                        <Icon name="calendar" className="w-4 h-4 text-gray-500" />
                    </button>
                    {open && (
                        <div className="absolute z-50 mt-1 bg-white border rounded-lg shadow-lg p-2 w-64">
                            <div className="flex items-center justify-between mb-1">
                                <button type="button" onClick={() => setView(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 })} className="px-2 py-1 rounded hover:bg-gray-100 text-lg leading-none">‹</button>
                                <span className="text-sm font-semibold">{MONTHS[view.m]} {view.y}</span>
                                <button type="button" onClick={() => setView(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 })} className="px-2 py-1 rounded hover:bg-gray-100 text-lg leading-none">›</button>
                            </div>
                            <div className="grid grid-cols-7 gap-0.5 text-center">
                                {WD.map(w => <div key={w} className="text-xs text-gray-500 font-medium py-1">{w}</div>)}
                                {cells.map((d, i) => {
                                    if (d === null) return <div key={'e' + i}></div>;
                                    const iso = toIso(view.y, view.m, d);
                                    const disabled = min && iso < min;
                                    return (
                                        <button key={iso} type="button" disabled={disabled}
                                            onClick={() => { onChange(iso); setOpen(false); }}
                                            className={`text-sm rounded py-1 ${iso === value ? 'bg-green-600 text-white' : iso === todayIso ? 'bg-green-100' : 'hover:bg-gray-100'} ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                            {d}
                                        </button>
                                    );
                                })}
                            </div>
                            <div className="flex justify-between mt-1">
                                {value ? <button type="button" onClick={() => { onChange(''); setOpen(false); }} className="text-xs text-gray-500 hover:text-gray-700">Löschen</button> : <span></span>}
                                <button type="button" onClick={() => setOpen(false)} className="text-xs text-gray-500 hover:text-gray-700">Schließen</button>

                        </div>

            const [rejectNote, setRejectNote] = useState('');
            const emptyRequestForm = { type: 'friendly', team: '', field: '', date: '', time: '', duration: 1.5, title: '', note: '', targetEventId: '', proposedDate: '', proposedTime: '', proposedField: '' };
            const [requestForm, setRequestForm] = useState(emptyRequestForm);
            const [requestReviewTarget, setRequestReviewTarget] = useState(null);
            const [reviewForm, setReviewForm] = useState({ field: '', cabin: [], position: '' });

            // Termine sortieren: nach Platz, Art, Zeit, dann Jugend aufsteigend
            const eventTypeKeys = Object.keys(eventTypes);
            const compareEvents = (a, b) => {
                const fa = fields.findIndex(f => f.id === a.field);
                const fb = fields.findIndex(f => f.id === b.field);
                if (fa !== fb) return (fa < 0 ? 99 : fa) - (fb < 0 ? 99 : fb);
                const ta = eventTypeKeys.indexOf(a.type);
                const tb = eventTypeKeys.indexOf(b.type);
                if (ta !== tb) return (ta < 0 ? 99 : ta) - (tb < 0 ? 99 : tb);
                const tc = (a.time || '').localeCompare(b.time || '');
                if (tc !== 0) return tc;
                const ya = teams.indexOf(a.team);
                const yb = teams.indexOf(b.team);
                return (ya < 0 ? 999 : ya) - (yb < 0 ? 999 : yb);
            };

            // Gefilterte Events (inkl. offener Anträge)
            const getFilteredEvents = () => {
                return [...events, ...requestDisplayEvents].filter(event => {
                    // Prüfe ob Event in der aktuellen Woche liegt
                    if (event.weekOffset !== undefined) {
                        // Für Serientermine: Prüfe ob sie in der aktuellen Woche liegen
                        if (event.weekOffset !== currentWeek) return false;
                    }

                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    if (myUnitsOnly && isTrainerLike && !myTeams.includes(event.team)) return false;
                    return true;
                }).sort(compareEvents);
            };

            // Termine eines bestimmten Wochentags in einer bestimmten Woche
            const getEventsForDay = (dayName, weekOffset) => {
                return [...events, ...requestDisplayEvents].filter(event => {
                    if (event.day !== dayName) return false;
                    if (event.weekOffset !== undefined && event.weekOffset !== weekOffset) return false;
                    if (filters.field && event.field !== filters.field) return false;
                    if (filters.type && event.type !== filters.type) return false;
                    if (filters.team && event.team !== filters.team) return false;
                    if (myUnitsOnly && isTrainerLike && !myTeams.includes(event.team)) return false;
                    return true;
                }).sort(compareEvents);
            };

            // Liste kommender Tage ab heute (für die mobile Scroll-Ansicht)
            const getUpcomingDays = (count) => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const thisMonday = getWeekStart(0);
                thisMonday.setHours(0, 0, 0, 0);
                const list = [];
                for (let i = 0; i < count; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    const dow = (d.getDay() + 6) % 7; // 0 = Montag
                    const dMonday = new Date(d);
                    dMonday.setDate(d.getDate() - dow);
                    const weekOffset = Math.round((dMonday - thisMonday) / (7 * 86400000));
                    list.push({
                        date: d,
                        dayName: weekdays[dow],
                        dateNum: d.getDate(),
                        month: d.getMonth() + 1,
                        weekOffset,
                        isToday: i === 0
                    });
                }
                return list;
            };

            // Hilfsfunktionen
            const getWeekStart = (weekOffset = 0) => {
                const today = new Date();
                const daysToMonday = today.getDay() === 0 ? 6 : today.getDay() - 1;
                const monday = new Date(today);
                monday.setDate(today.getDate() - daysToMonday + (weekOffset * 7));
                return monday;
            };

            const formatDate = (date) => date.toLocaleDateString('de-DE');

            // Datum als ISO-String (lokal, ohne Zeitzonen-Versatz): "2026-05-17"
            const toISODate = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            // ISO-Datum kurz darstellen: "2026-05-17" -> "17.05."
            const formatISODate = (iso) => {
                if (!iso) return '';
                const [, m, d] = iso.split('-');
                return `${d}.${m}.`;
            };

            const getWeekDates = (weekOffset = 0) => {
                const weekStart = getWeekStart(weekOffset);
                const today = new Date();
                return weekdays.map((day, index) => {
                    const date = new Date(weekStart);
                    date.setDate(weekStart.getDate() + index);
                    const isToday = date.getDate() === today.getDate()
                        && date.getMonth() === today.getMonth()
                        && date.getFullYear() === today.getFullYear();
                    return { day, date: date.getDate(), month: date.getMonth() + 1, isToday, iso: toISODate(date) };
                });
            };

            // ISO-Datum -> Wochentag-Name
            const dateToWeekday = (iso) => {
                if (!iso) return '';
                const d = new Date(iso + 'T00:00:00');
                return weekdays[(d.getDay() + 6) % 7];
            };

            // ISO-Datum -> Wochen-Versatz relativ zur aktuellen Woche
            const dateToWeekOffset = (iso) => {
                if (!iso) return undefined;
                const d = new Date(iso + 'T00:00:00');
                const dow = (d.getDay() + 6) % 7;
                const dMonday = new Date(d);
                dMonday.setDate(d.getDate() - dow);
                dMonday.setHours(0, 0, 0, 0);
                const thisMonday = getWeekStart(0);
                thisMonday.setHours(0, 0, 0, 0);
                return Math.round((dMonday - thisMonday) / (7 * 86400000));
            };

            // Offene Anträge als termin-ähnliche Objekte für die Plan-Anzeige
            const requestDisplayEvents = requests.filter(r => r.status === 'pending').map(r => {
                if (r.kind === 'reschedule') {
                    const target = events.find(e => String(e.id) === String(r.targetEventId)) || {};
                    const p = r.proposed || {};
                    return {
                        id: 'req-' + r.id, isRequest: true, requestId: r.id, requestKind: 'reschedule', requestType: r.type,
                        type: target.type || 'match', team: target.team || '?', title: target.title || '',
                        field: p.field || target.field || '', time: p.time || '', duration: target.duration || 1.5,
                        day: dateToWeekday(p.date), weekOffset: dateToWeekOffset(p.date), eventDate: p.date || '',
                        cabin: target.cabin || [], trainer: target.trainer || '', position: target.position || ''
                    };
                }
                const ev = r.event || {};
                const iso = ev.date || ev.eventDate || '';
                return {
                    ...ev,
                    id: 'req-' + r.id, isRequest: true, requestId: r.id, requestKind: 'new', requestType: r.type,
                    day: iso ? dateToWeekday(iso) : ev.day,
                    weekOffset: iso ? dateToWeekOffset(iso) : ev.weekOffset,
                    eventDate: iso
                };
            });

            // Platzsperren, die ein bestimmtes Datum abdecken (optional auf einen Platz gefiltert)
            const closuresOnDate = (iso, fieldId) => {
                return closures.filter(c =>
                    c.fromDate <= iso && iso <= c.toDate &&
                    (fieldId ? c.field === fieldId : true)
                );
            };

            const getEventEndTime = (event) => {
                const startTime = parseFloat(event.time.replace(':', '.').replace('30', '5'));
                const endTime = startTime + event.duration;
                const hours = Math.floor(endTime);
                const minutes = (endTime - hours) * 60;
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            };

            // Startzeit als Dezimalstunden (z. B. "17:30" -> 17.5)
            const timeToHours = (time) => {
                const [h, m] = time.split(':').map(Number);
                return h + m / 60;
            };

            // Termine, die denselben Platz im selben Zeitraum belegen.
            // Geteilte Platzhälften (links/mitte/rechts) gelten nicht als Konflikt.
            const findConflicts = (candidate) => {
                if (!candidate.field || !candidate.day || !candidate.time) return [];
                const start = timeToHours(candidate.time);
                const end = start + candidate.duration;
                return events.filter(e => {
                    if (e.id === candidate.id) return false;
                    if (e.cancelled) return false;
                    if (e.field !== candidate.field || e.day !== candidate.day) return false;
                    if (e.weekOffset !== undefined && candidate.weekOffset !== undefined
                        && e.weekOffset !== candidate.weekOffset) return false;
                    const eStart = timeToHours(e.time);
                    if (!(start < eStart + e.duration && eStart < end)) return false;
                    const sharable = e.type !== 'blocked' && candidate.type !== 'blocked'
                        && e.position && candidate.position && e.position !== candidate.position;
                    return !sharable;
                });
            };

            // Enthält der Sperrzeitraum mindestens einen bestimmten Wochentag? (0 = Montag)
            const closureCoversWeekday = (closure, dayIndex) => {
                const from = new Date(closure.fromDate + 'T00:00:00');
                const to = new Date(closure.toDate + 'T00:00:00');
                if ((to - from) / 86400000 >= 6) return true; // Zeitraum >= 7 Tage enthält jeden Wochentag
                for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
                    if (((d.getDay() + 6) % 7) === dayIndex) return true;
                }
                return false;
            };

            // Platzsperren, die mit einem (geplanten) Termin kollidieren
            const closuresForEvent = (candidate) => {
                if (!candidate.field || !candidate.day) return [];
                const fieldClosures = closures.filter(c => c.field === candidate.field);
                if (fieldClosures.length === 0) return [];
                if (candidate.eventDate) {
                    const iso = toISODate(new Date(candidate.eventDate));
                    return fieldClosures.filter(c => c.fromDate <= iso && iso <= c.toDate);
                }
                const dayIndex = weekdays.indexOf(candidate.day);
                return fieldClosures.filter(c => closureCoversWeekday(c, dayIndex));
            };

            // Hinweistext zur Konflikt-Warnung (blockt nicht, weist hin)
            const conflictMessage = (eventConflicts, closureConflicts, candidate) => {
                const field = fields.find(f => f.id === candidate.field);
                const parts = [];

                if (closureConflicts.length > 0) {
                    const c = closureConflicts[0];
                    const range = c.fromDate === c.toDate
                        ? formatISODate(c.fromDate)
                        : `${formatISODate(c.fromDate)} – ${formatISODate(c.toDate)}`;
                    parts.push(`${field?.name} ist gesperrt (${range}${c.reason ? ' · ' + c.reason : ''}).`);
                }

                if (eventConflicts.length > 0) {
                    const first = eventConflicts[0];
                    const firstLabel = first.type === 'blocked'
                        ? 'eine Platzsperre'
                        : `${first.team} (${eventTypes[first.type].label})`;
                    const more = eventConflicts.length > 1
                        ? ` (+${eventConflicts.length - 1} weitere Überschneidung${eventConflicts.length - 1 > 1 ? 'en' : ''})`
                        : '';
                    // Sonderregel: Pflichtspiel darf auf einem Trainings-Slot landen
                    const overriddenTraining = candidate.type === 'match'
                        && eventConflicts.find(c => c.type === 'training');
                    if (overriddenTraining) {
                        parts.push(`Das Pflichtspiel am ${candidate.day} um ${first.time}–${getEventEndTime(first)} Uhr `
                            + `überschneidet sich mit dem Training von ${overriddenTraining.team}. `
                            + `Pflichtspiele haben Vorrang – bitte das Trainerteam informieren und das Training verlegen.`);
                    } else {
                        parts.push(`${candidate.day}, ${first.time}–${getEventEndTime(first)} Uhr `
                            + `bereits belegt: ${firstLabel}.${more}`);
                    }
                }

                return parts.join(' ') + ' Termin trotzdem speichern?';
            };

            // Hover-Handler (auf Touch-Geräten kein Tooltip)
            const handleEventHover = (event, mouseEvent) => {
                if (isMobile) return;
                setHoveredEvent(event);
                setHoverPosition({
                    x: mouseEvent.clientX,
                    y: mouseEvent.clientY
                });
            };

            const handleEventLeave = () => {
                setHoveredEvent(null);
            };

            // Klick auf einen Termin: Admin bearbeitet, Trainer sieht Aktionen für eigene Einheiten,
            // beantragte Termine öffnen für Admins die Antragsprüfung
            const handleEventClick = (event) => {
                if (event && event.isRequest) {
                    if (!isAdmin) return;
                    const r = requests.find(x => x.id === event.requestId);
                    if (r) openReview(r);
                    return;
                }
                if (isAdmin) { setEditingEvent({ ...event, date: event.date || event.eventDate || '' }); return; }
                if (ownsEvent(event)) { setEventActionTarget(event); }
            };

            // Spielarten (mit Gegner)
            const GAME_TYPES = ['match', 'friendly', 'cup', 'makeup', 'tournament'];

            // Termin-Karte. opts.hideAnchor blendet den Platz-Anker aus
            // (für Design 2, wo der Platz in der Gruppen-Leiste steht).
            const renderEventCard = (event, opts = {}) => {
                const eventType = eventTypes[event.type];
                const field = fields.find(f => f.id === event.field);
                const isBlocked = event.type === 'blocked';
                const isCancelled = !!event.cancelled;
                const isReq = !!event.isRequest;
                const isGame = GAME_TYPES.includes(event.type);
                const heading = isBlocked ? 'Sperre'
                    : (isGame && event.title ? `${event.team} – ${event.title}` : event.team);
                return (
                    <div
                        key={event.id}
                        className={`bg-white rounded-lg shadow-sm text-xs cursor-pointer hover:shadow transition-shadow flex overflow-hidden ${isCancelled ? 'opacity-60' : ''} ${isReq ? 'border-2 border-dashed border-amber-400' : 'border border-gray-200'}`}
                        onClick={() => handleEventClick(event)}
                        onMouseEnter={(e) => handleEventHover(event, e)}
                        onMouseLeave={handleEventLeave}
                        onMouseMove={(e) => {
                            if (hoveredEvent?.id === event.id) {
                                setHoverPosition({ x: e.clientX, y: e.clientY });
                            }
                        }}
                    >
                        {!opts.hideAnchor && (
                            <div className={`${field?.tint || 'bg-gray-100'} flex items-center justify-center px-2`} style={{ minWidth: '46px' }}>
                                <span className={`${field?.anchor || 'text-gray-600'} font-extrabold text-base leading-none`}>{field?.shortName}</span>
                            </div>
                        )}
                        <div className="flex-1 min-w-0 p-2">
                            <div className="flex items-start gap-1.5 min-w-0">
                                <span className="w-2.5 h-2.5 rounded-full shrink-0 mt-1" style={{ backgroundColor: isBlocked ? '#6b7280' : (teamColors[event.team] || '#9ca3af') }}></span>
                                <span className={`text-sm font-bold text-gray-900 leading-tight ${isCancelled ? 'line-through' : ''}`}>{heading}</span>
                            </div>
                            <div className="space-y-0.5 mt-1">
                                <div className="flex items-center gap-1 text-gray-700"><Icon name="clock" className="w-3 h-3" /> {event.time} – {getEventEndTime(event)}</div>
                                <div className="flex items-center gap-1 text-gray-600"><Icon name="mapPin" className="w-3 h-3" /> {field?.name}{!isBlocked && ` (${event.position ? positions.find(p => p.value === event.position)?.label : 'ganzer Platz'})`}</div>
                                {event.trainer && <div className="flex items-center gap-1 text-gray-600"><Icon name="user" className="w-3 h-3" /> {trainerFirstName(event.trainer)}</div>}
                                {cabinText(event.cabin) && <div className="flex items-center gap-1 text-gray-600"><Icon name="door" className="w-3 h-3" /> {cabinText(event.cabin)}</div>}
                            </div>
                            <div className="flex items-center justify-end gap-1 mt-1">
                                {isReq && <span className="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded-full font-semibold whitespace-nowrap" style={{ fontSize: '10px' }}>Antrag</span>}
                                {isCancelled
                                    ? <span className="bg-red-100 text-red-700 px-1.5 py-0.5 rounded-full font-semibold whitespace-nowrap" style={{ fontSize: '10px' }}>fällt aus</span>
                                    : <span className={`${eventType.pill} px-1.5 py-0.5 rounded-full font-semibold whitespace-nowrap`} style={{ fontSize: '10px' }}>{eventType.label}</span>}
                            </div>
                        </div>
                    </div>
                );
            };

            // Termine eines Tages rendern – Design 1 (Kartenliste) oder
            // Design 2 (nach Platz gruppiert mit farbiger Platz-Leiste)
            const renderDayEvents = (dayEvents) => {
                if (planDesign !== '2') return dayEvents.map(e => renderEventCard(e));
                const groups = [];
                dayEvents.forEach(e => {
                    const last = groups[groups.length - 1];
                    if (last && last.field === e.field) last.events.push(e);
                    else groups.push({ field: e.field, events: [e] });
                });
                return groups.map((g, i) => {
                    const fld = fields.find(f => f.id === g.field);
                    return (
                        <div key={'grp' + i + (g.field || '')} className="space-y-1">
                            <div className={`${fld?.headerColor || 'bg-gray-500'} text-white text-xs font-semibold rounded px-2 py-1`}>{fld?.name || 'Ohne Platz'}</div>
                            {g.events.map(e => renderEventCard(e, { hideAnchor: true }))}
                        </div>
                    );
                });
            };

            // Hilfsfunktion für Event-Positionierung
            const getEventPositions = (day) => {
                const filteredEvents = getFilteredEvents();
                const dayEvents = filteredEvents.filter(e => e.day === day);
                const positions = [];
                
                dayEvents.forEach(event => {
                    const startIndex = timeSlots.indexOf(event.time);
                    if (startIndex === -1) return;
                    
                    const endIndex = startIndex + Math.ceil(event.duration * 2); // 30min pro Slot
                    
                    // Finde andere Events zur gleichen Zeit auf dem gleichen Platz
                    const sameTimeFieldEvents = dayEvents.filter(e => 
                        e.time === event.time && 
                        e.field === event.field &&
                        timeSlots.indexOf(e.time) !== -1
                    );
                    
                    // Sortiere Events nach Position (links, mitte, rechts)
                    sameTimeFieldEvents.sort((a, b) => {
                        const positionOrder = { 'li': 0, 'mi': 1, 're': 2, '': 3 };
                        const aOrder = positionOrder[a.position] !== undefined ? positionOrder[a.position] : 3;
                        const bOrder = positionOrder[b.position] !== undefined ? positionOrder[b.position] : 3;
                        return aOrder - bOrder;
                    });
                    
                    // Finde die Position dieses Events in der sortierten Liste
                    const positionInGroup = sameTimeFieldEvents.findIndex(e => e.id === event.id);
                    const groupSize = sameTimeFieldEvents.length;
                    
                    // Berechne Spalte basierend auf Zeit-Konflikten mit anderen Plätzen
                    let column = 0;
                    while (true) {
                        const conflict = positions.find(pos => 
                            pos.column === column &&
                            pos.startIndex < endIndex &&
                            pos.endIndex > startIndex &&
                            pos.field !== event.field // Nur Konflikte mit anderen Plätzen
                        );
                        
                        if (!conflict) break;
                        column++;
                    }
                    
                    positions.push({
                        ...event,
                        column,
                        startIndex,
                        endIndex,
                        positionInGroup,
                        groupSize
                    });
                });
                
                return positions;
            };

            const addNotification = (message, type = 'info', options = {}) => {
                const notification = { id: Date.now() + Math.random(), message, type, action: options.action };
                setNotifications(prev => [notification, ...prev.slice(0, 2)]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== notification.id)), options.duration || 5000);
            };

            const removeNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            // Bildschirmbreite überwachen (Handy vs. Desktop)
            useEffect(() => {
                const onResize = () => {
                    const mobile = window.innerWidth < 768;
                    setIsNarrowScreen(mobile);
                    if (mobile) setViewMode('calendar');
                };
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            // Tastaturhöhe auf dem Handy ermitteln, damit Dialoge nach oben rücken
            useEffect(() => {
                const vv = window.visualViewport;
                if (!vv) return;
                const update = () => {
                    const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
                    document.documentElement.style.setProperty('--kb-inset', `${inset}px`);
                };
                update();
                vv.addEventListener('resize', update);
                vv.addEventListener('scroll', update);
                return () => {
                    vv.removeEventListener('resize', update);
                    vv.removeEventListener('scroll', update);
                };
            }, []);

            // ESC-Taste Handler
            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        setShowAddModal(false);
                        setShowExportModal(false);
                        setShowLoginModal(false);
                        setShowClosureModal(false);
                        setShowUserModal(false);
                        setShowStammdatenModal(false);
                        setShowRequestsModal(false);
                        setShowInbox(false);
                        setEventActionTarget(null);
                        setSeriesDeleteTarget(null);
                        setRequestReviewTarget(null);
                        setConfirmDialog(null);
                        setEditingEvent(null);
                    }
                };
                
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);
            // Beispiel-Termine (nur für den lokalen Modus ohne Firebase)
            const EXAMPLE_EVENTS = [
                { id: 1, field: 'platz2', day: 'Montag', time: '17:00', duration: 1.5, type: 'training', team: 'U15', title: 'U15 Training', cabin: 'Kabine 1', trainer: 'Max Mustermann', position: 'mi' },
                { id: 2, field: 'platz1', day: 'Dienstag', time: '18:00', duration: 2, type: 'match', team: 'U16', title: 'U16 vs FC Hamburg', cabin: 'Kabine 2', trainer: 'Anna Schmidt', position: 'li' }
            ];

            // Daten laden: Firebase-Echtzeit-Sync oder lokaler Fallback
            useEffect(() => {
                if (!FIREBASE_READY) {
                    try {
                        const saved = localStorage.getItem('football-events');
                        setEvents(saved ? JSON.parse(saved) : EXAMPLE_EVENTS);
                        const savedClosures = localStorage.getItem('football-closures');
                        setClosures(savedClosures ? JSON.parse(savedClosures) : []);
                        const savedColors = localStorage.getItem('football-teamcolors');
                        setTeamColors({ ...DEFAULT_TEAM_COLORS, ...(savedColors ? JSON.parse(savedColors) : {}) });
                        const savedTeams = localStorage.getItem('football-teams');
                        const parsedTeams = savedTeams ? JSON.parse(savedTeams) : null;
                        setTeams(parsedTeams && parsedTeams.length > 0 ? parsedTeams : DEFAULT_TEAMS);
                    } catch (e) {
                        console.error('Fehler beim Laden der Daten:', e);
                        setEvents(EXAMPLE_EVENTS);
                    }
                    setDataLoaded(true);
                    return;
                }
                const unsubData = planDoc().onSnapshot(
                    (snap) => {
                        const data = snap.exists ? snap.data() : null;
                        setEvents(data && Array.isArray(data.events) ? data.events : []);
                        setClosures(data && Array.isArray(data.closures) ? data.closures : []);
                        setTeamColors({ ...DEFAULT_TEAM_COLORS, ...((data && data.teamColors) || {}) });
                        setTeams(data && Array.isArray(data.teams) && data.teams.length > 0 ? data.teams : DEFAULT_TEAMS);
                        setCloudStatus(snap.metadata.fromCache ? 'offline' : 'online');
                        setDataLoaded(true);
                    },
                    (err) => {
                        console.error('Firestore-Fehler:', err);
                        setCloudStatus('error');
                        setDataLoaded(true);
                        addNotification('Cloud-Verbindung fehlgeschlagen', 'warning');
                    }
                );
                const unsubAuth = auth.onAuthStateChanged(async (user) => {
                    setAuthUser(user || null);
                    // Bootstrap: beim ersten Login des Admin-Kontos das Admin-Profil anlegen
                    if (user && user.email && user.email.toLowerCase() === BOOTSTRAP_ADMIN_EMAIL.toLowerCase()) {
                        try {
                            const ref = db.collection('users').doc(user.uid);
                            const snap = await ref.get();
                            if (!snap.exists) {
                                await ref.set({ name: 'Administrator', email: user.email, role: 'admin', teams: [], createdAt: Date.now() });
                            }
                        } catch (e) {
                            console.error('Admin-Bootstrap fehlgeschlagen:', e);
                        }
                    }
                });
                return () => { unsubData(); unsubAuth(); };
            }, []);

            // Benutzerliste laden (nur für angemeldete Nutzer)
            useEffect(() => {
                if (!FIREBASE_READY || !authUser) { setAllUsers([]); return; }
                const unsub = db.collection('users').onSnapshot(
                    (snap) => setAllUsers(snap.docs.map(d => ({ uid: d.id, ...d.data() }))),
                    (err) => console.error('Benutzer-Snapshot fehlgeschlagen:', err)
                );
                return () => unsub();
            }, [authUser]);

            // Anträge laden (nur für angemeldete Nutzer)
            useEffect(() => {
                if (!FIREBASE_READY || !authUser) { setRequests([]); return; }
                const unsub = db.collection('requests').onSnapshot(
                    (snap) => setRequests(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error('Anträge-Snapshot fehlgeschlagen:', err)
                );
                return () => unsub();
            }, [authUser]);

            // Benachrichtigungen des angemeldeten Nutzers laden
            useEffect(() => {
                if (!FIREBASE_READY || !authUser) { setInbox([]); return; }
                const unsub = db.collection('notifications')
                    .where('recipientUid', '==', authUser.uid)
                    .onSnapshot((snap) => {
                        setInbox(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        // Browser-Hinweis für Benachrichtigungen, die nach dem Öffnen eingingen
                        snap.docChanges().forEach((ch) => {
                            const data = ch.doc.data();
                            if (ch.type === 'added' && !data.read && (data.createdAt || 0) > APP_OPENED_AT
                                && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                                try { new Notification(data.title || 'Platzbelegungsplaner', { body: data.body || '' }); } catch (e) {}
                            }
                        });
                    }, (err) => console.error('Benachrichtigungen-Snapshot fehlgeschlagen:', err));
                return () => unsub();
            }, [authUser]);

            // Lokaler Fallback: in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && events.length > 0) {
                    try {
                        localStorage.setItem('football-events', JSON.stringify(events));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Daten:', e);
                        addNotification('Daten konnten nicht gespeichert werden', 'warning');
                    }
                }
            }, [events]);

            // Lokaler Fallback: Platzsperren in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && dataLoaded) {
                    try {
                        localStorage.setItem('football-closures', JSON.stringify(closures));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Platzsperren:', e);
                    }
                }
            }, [closures, dataLoaded]);

            // Lokaler Fallback: Teamfarben in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && dataLoaded) {
                    try {
                        localStorage.setItem('football-teamcolors', JSON.stringify(teamColors));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Teamfarben:', e);
                    }
                }
            }, [teamColors, dataLoaded]);

            // Lokaler Fallback: Teamliste in localStorage sichern (nur ohne Firebase)
            useEffect(() => {
                if (!FIREBASE_READY && dataLoaded) {
                    try {
                        localStorage.setItem('football-teams', JSON.stringify(teams));
                    } catch (e) {
                        console.error('Fehler beim Speichern der Teamliste:', e);
                    }
                }
            }, [teams, dataLoaded]);

            // Termine speichern: lokal sofort, in der Cloud für alle
            const commitEvents = (next) => {
                setEvents(next);
                if (FIREBASE_READY) {
                    planDoc().set({ events: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Platzsperren speichern: lokal sofort, in der Cloud für alle
            const commitClosures = (next) => {
                setClosures(next);
                if (FIREBASE_READY) {
                    planDoc().set({ closures: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Teamfarben speichern: lokal sofort, in der Cloud für alle
            const commitTeamColors = (next) => {
                setTeamColors(next);
                if (FIREBASE_READY) {
                    planDoc().set({ teamColors: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            // Teamliste speichern: lokal sofort, in der Cloud für alle
            const commitTeams = (next) => {
                setTeams(next);
                if (FIREBASE_READY) {
                    planDoc().set({ teams: next, updatedAt: Date.now() }, { merge: true })
                        .catch((e) => {
                            console.error('Cloud-Speichern fehlgeschlagen:', e);
                            addNotification('Speichern in der Cloud fehlgeschlagen', 'warning');
                        });
                }
            };

            const addTeam = () => {
                const n = newTeamName.trim();
                if (!n) return;
                if (teams.some(x => x.toLowerCase() === n.toLowerCase())) {
                    addNotification('Dieses Team gibt es bereits', 'warning');
                    return;
                }
                commitTeams([...teams, n]);
                setNewTeamName('');
            };

            const removeTeam = (t) => {
                const used = events.filter(e => e.team === t).length;
                const remove = () => commitTeams(teams.filter(x => x !== t));
                if (used > 0) {
                    askConfirm(`Team „${t}" entfernen? ${used} vorhandene Termine behalten den Namen, das Team verschwindet aber aus den Auswahllisten.`, remove);
                } else {
                    remove();
                }
            };

            // Kabinen-Anzeige (Mehrfachauswahl als Liste, Altdaten als Text)
            const cabinText = (cabin) => Array.isArray(cabin) ? cabin.join(', ') : (cabin || '');
            // Trainer-Anzeige: nur der Vorname (erstes Wort des Namens)
            const trainerFirstName = (n) => (n || '').trim().split(/\s+/)[0] || '';
            // Trainer, der einem Team zugewiesen ist (erster Treffer)
            const trainerForTeam = (team) => {
                const u = allUsers.find(x => Array.isArray(x.teams) && x.teams.includes(team));
                return u ? u.name : '';
            };

            // Profil des aktuell angemeldeten Nutzers (aus der users-Sammlung)
            const userProfile = FIREBASE_READY
                ? (allUsers.find(u => u.uid === authUser?.uid) || null)
                : null;
            const userRole = !FIREBASE_READY ? 'admin' : (userProfile ? userProfile.role : null);
            const isRealAdmin = userRole === 'admin';
            // Admins können testweise in die Benutzer-Ansicht wechseln
            const isAdmin = isRealAdmin && !viewAsUser;

            // Darf der aktuelle Nutzer den vollen Bearbeiten-Modus nutzen? (nur Admins)
            const canEdit = isAdmin;

            const ROLE_LABELS = { admin: 'Admin', trainer: 'Trainer', cotrainer: 'Co-Trainer' };
            const REQUEST_TYPE_LABELS = { friendly: 'Freundschaftsspiel', reschedule: 'Spielverlegung', training: 'Zusätzliches Training', tournament: 'Turnier / Leistungsvergleich', camp: 'Trainingslager' };
            const REQUEST_EVENT_TYPE = { training: 'training', camp: 'camp', tournament: 'tournament', friendly: 'friendly' };

            // Trainer/Co-Trainer – oder ein Admin, der die Benutzer-Ansicht testet
            const isTrainerLike = userRole === 'trainer' || userRole === 'cotrainer' || (isRealAdmin && viewAsUser);
            const myTeams = (userProfile && Array.isArray(userProfile.teams)) ? userProfile.teams : [];
            // Gehört dieser Termin (Training) zu einem meiner Teams?
            const ownsEvent = (event) => isTrainerLike && event && event.type === 'training' && myTeams.includes(event.team);
            const pendingRequests = requests.filter(r => r.status === 'pending');

            // Prüft, ob bearbeitet werden darf; sonst Anmelde-Dialog bzw. Hinweis
            const requireEditor = () => {
                if (canEdit) return true;
                if (FIREBASE_READY && authUser) {
                    addNotification('Dafür fehlt dir die Berechtigung.', 'warning');
                    return false;
                }
                setShowLoginModal(true);
                return false;
            };

            // Termin-Dialog öffnen; Team wird aus dem Profil vorbefüllt
            const openAddModal = (extra = {}) => {
                if (!requireEditor()) return;
                const team = myTeams.length > 0 ? myTeams[0] : '';
                setNewEvent({ ...emptyNewEvent, team, trainer: trainerForTeam(team) || '', ...extra });
                setShowAddModal(true);
            };

            // App-eigener Bestätigungsdialog statt window.confirm
            const askConfirm = (message, onConfirm) => setConfirmDialog({ message, onConfirm });

            const handleLogin = () => {
                if (!FIREBASE_READY) {
                    addNotification('Firebase ist noch nicht konfiguriert', 'warning');
                    return;
                }
                if (!loginEmail || !loginPassword) return;
                setLoggingIn(true);
                auth.signInWithEmailAndPassword(loginEmail.trim(), loginPassword)
                    .then(() => {
                        setShowLoginModal(false);
                        setLoginPassword('');
                        addNotification('Angemeldet', 'success');
                    })
                    .catch(() => addNotification('E-Mail oder Passwort falsch', 'warning'))
                    .finally(() => setLoggingIn(false));
            };

            const handleForgotPassword = () => {
                if (!FIREBASE_READY) return;
                if (!loginEmail.trim()) { addNotification('Bitte zuerst die E-Mail-Adresse eingeben.', 'warning'); return; }
                auth.sendPasswordResetEmail(loginEmail.trim())
                    .then(() => addNotification('E-Mail zum Zurücksetzen wurde gesendet.', 'success'))
                    .catch(() => addNotification('Senden fehlgeschlagen – E-Mail prüfen.', 'warning'));
            };

            const handleLogout = () => {
                if (FIREBASE_READY && auth) auth.signOut();
                addNotification('Abgemeldet', 'info');
            };

            // Benutzerkonto anlegen – über eine zweite Firebase-Instanz,
            // damit der angemeldete Admin nicht abgemeldet wird.
            const createUserAccount = async ({ firstName, lastName, email, password, role, teams }) => {
                const secondary = firebase.apps.find(a => a.name === 'secondary')
                    || firebase.initializeApp(firebaseConfig, 'secondary');
                try {
                    const cred = await secondary.auth().createUserWithEmailAndPassword(email.trim(), password);
                    const fn = firstName.trim(), ln = lastName.trim();
                    await db.collection('users').doc(cred.user.uid).set({
                        firstName: fn, lastName: ln, name: `${fn} ${ln}`.trim(),
                        email: email.trim(), role, teams, createdAt: Date.now()
                    });
                    const uid = cred.user.uid;
                    await secondary.auth().signOut();
                    return { ok: true, uid };
                } catch (e) {
                    return { ok: false, error: e.message };
                }
            };

            const saveUser = async () => {
                if (!isAdmin) { addNotification('Dafür fehlt dir die Berechtigung.', 'warning'); return; }
                const f = userForm;
                const fn = f.firstName.trim(), ln = f.lastName.trim();
                if (!fn || !ln) { addNotification('Bitte Vor- und Nachname angeben.', 'warning'); return; }
                const fullName = `${fn} ${ln}`;
                if (f.uid) {
                    if (f.uid === authUser?.uid && f.role !== 'admin') {
                        addNotification('Du kannst dir nicht selbst die Admin-Rolle entziehen.', 'warning');
                        return;
                    }
                    // Bestehenden Benutzer aktualisieren (Name, Rolle, Teams)
                    try {
                        await db.collection('users').doc(f.uid).update({ firstName: fn, lastName: ln, name: fullName, role: f.role, teams: f.teams });
                        addNotification('Benutzer aktualisiert', 'success');
                        setUserForm(emptyUserForm);
                    } catch (e) {
                        addNotification('Aktualisierung fehlgeschlagen', 'warning');
                    }
                } else {
                    if (!f.email.trim() || !f.password) { addNotification('Bitte E-Mail und Start-Passwort angeben.', 'warning'); return; }
                    if (f.password.length < 6) { addNotification('Das Passwort muss mindestens 6 Zeichen haben.', 'warning'); return; }
                    const res = await createUserAccount(f);
                    if (res.ok) {
                        addNotification('Benutzer angelegt', 'success');
                        // Willkommens-Benachrichtigung (wird per Cloud Function auch als E-Mail versendet)
                        if (res.uid) {
                            db.collection('notifications').add({
                                recipientUid: res.uid, read: false, createdAt: Date.now(),
                                type: 'welcome', title: 'Willkommen beim Platzbelegungsplaner',
                                body: `Hallo ${fn},\n\nfür dich wurde ein Zugang zum Platzbelegungsplaner des TSV Elstorf angelegt.\n\n`
                                    + `E-Mail zum Anmelden: ${f.email.trim()}\nRolle: ${ROLE_LABELS[f.role] || f.role}\n\n`
                                    + `Das Start-Passwort teilt dir der Administrator persönlich mit. `
                                    + `Du kannst es nach dem ersten Login jederzeit über „Passwort vergessen" zurücksetzen.`
                            }).catch((e) => console.error('Willkommens-Benachrichtigung fehlgeschlagen:', e));
                        }
                        setUserForm(emptyUserForm);
                    } else {
                        addNotification(`Anlegen fehlgeschlagen: ${res.error}`, 'warning');
                    }
                }
            };

            const deleteUserProfile = (u) => {
                if (!isAdmin) return;
                if (u.uid === authUser?.uid) {
                    addNotification('Du kannst dein eigenes Profil nicht entfernen.', 'warning');
                    return;
                }
                askConfirm(`Benutzerprofil von ${u.name} entfernen? Das Konto kann sich dann nicht mehr anmelden-berechtigt nutzen.`, async () => {
                    try {
                        await db.collection('users').doc(u.uid).delete();
                        addNotification('Benutzerprofil entfernt', 'info');
                    } catch (e) {
                        addNotification('Entfernen fehlgeschlagen', 'warning');
                    }
                });
            };

            const sendUserPasswordReset = (email) => {
                if (!FIREBASE_READY) return;
                auth.sendPasswordResetEmail(email)
                    .then(() => addNotification('Passwort-Reset-Mail gesendet', 'success'))
                    .catch(() => addNotification('Senden fehlgeschlagen', 'warning'));
            };

            // ===== Phase 4: Benachrichtigungen =====
            const unreadInbox = inbox.filter(n => !n.read);
            const adminUids = () => allUsers.filter(u => u.role === 'admin' && u.uid !== authUser?.uid).map(u => u.uid);
            const teamTrainerUids = (team) => allUsers.filter(u => (u.teams || []).includes(team) && u.uid !== authUser?.uid).map(u => u.uid);

            // Benachrichtigungen anlegen. Der E-Mail-Versand passiert
            // serverseitig: Eine Cloud Function reagiert auf neue
            // notifications-Dokumente (siehe functions/index.js).
            const pushNotification = (recipientUids, payload) => {
                if (!FIREBASE_READY) return;
                const uids = [...new Set(recipientUids)].filter(Boolean);
                uids.forEach((uid) => {
                    db.collection('notifications').add({ recipientUid: uid, read: false, createdAt: Date.now(), ...payload })
                        .catch((e) => console.error('Benachrichtigung fehlgeschlagen:', e));
                });
            };

            const markInboxRead = () => {
                if (!FIREBASE_READY) return;
                unreadInbox.forEach((n) => {
                    db.collection('notifications').doc(n.id).update({ read: true }).catch(() => {});
                });
            };

            const clearInbox = () => {
                if (!FIREBASE_READY || inbox.length === 0) return;
                askConfirm('Alle Benachrichtigungen löschen?', () => {
                    inbox.forEach((n) => {
                        db.collection('notifications').doc(n.id).delete().catch(() => {});
                    });
                });
            };

            const requestBrowserNotifications = () => {
                if (typeof Notification === 'undefined') {
                    addNotification('Dieser Browser unterstützt keine Hinweise', 'warning');
                    return;
                }
                Notification.requestPermission().then((perm) => {
                    if (perm === 'granted') addNotification('Browser-Hinweise aktiviert', 'success');
                    else addNotification('Browser-Hinweise nicht erlaubt', 'info');
                });
            };

            // ===== Phase 2: eigene Einheiten absagen / löschen =====
            const cancelEvent = (event) => {
                if (!isAdmin && !ownsEvent(event)) { addNotification('Dafür fehlt dir die Berechtigung.', 'warning'); return; }
                askConfirm('Diese Einheit absagen? Sie bleibt als „fällt aus" sichtbar, Platz und Kabine werden frei.', () => {
                    commitEvents(events.map(e => e.id === event.id
                        ? { ...e, cancelled: true, cancelledBy: userProfile?.name || 'Admin', cancelledAt: Date.now() }
                        : e));
                    addNotification('Einheit abgesagt', 'info');
                    pushNotification(isAdmin ? teamTrainerUids(event.team) : adminUids(), {
                        type: 'event_cancelled', title: 'Einheit fällt aus',
                        body: `${event.team} Training am ${event.day}, ${event.time} Uhr fällt aus (${userProfile?.name || 'Admin'}).`
                    });
                });
            };

            const reactivateEvent = (event) => {
                if (!isAdmin && !ownsEvent(event)) { addNotification('Dafür fehlt dir die Berechtigung.', 'warning'); return; }
                commitEvents(events.map(e => {
                    if (e.id !== event.id) return e;
                    const { cancelled, cancelledBy, cancelledAt, ...rest } = e;
                    return rest;
                }));
                addNotification('Einheit wieder aktiv', 'success');
            };

            const removeOwnEvent = (event) => {
                if (!isAdmin && !ownsEvent(event)) { addNotification('Dafür fehlt dir die Berechtigung.', 'warning'); return; }
                askConfirm('Diese Einheit endgültig löschen? Sie verschwindet komplett aus dem Plan.', () => {
                    const previous = events;
                    commitEvents(events.filter(e => e.id !== event.id));
                    addNotification('Einheit gelöscht', 'info', { duration: 7000, action: { label: 'Rückgängig', onClick: () => { commitEvents(previous); addNotification('Einheit wiederhergestellt', 'success'); } } });
                    pushNotification(isAdmin ? teamTrainerUids(event.team) : adminUids(), {
                        type: 'event_deleted', title: 'Einheit gelöscht',
                        body: `${event.team} Training am ${event.day}, ${event.time} Uhr wurde gelöscht (${userProfile?.name || 'Admin'}).`
                    });
                });
            };

            // ===== Phase 3: Antrags-Workflow =====
            const submitRequest = async () => {
                if (!FIREBASE_READY || !authUser || !userProfile) { addNotification('Bitte zuerst anmelden.', 'warning'); return; }
                const f = requestForm;
                const base = {
                    type: f.type,
                    status: 'pending',
                    requestedBy: authUser.uid,
                    requestedByName: userProfile.name,
                    note: f.note.trim(),
                    createdAt: Date.now()
                };
                let payload;
                if (f.type === 'reschedule') {
                    if (!f.targetEventId || !f.proposedDate || !f.proposedTime) {
                        addNotification('Bitte Spiel, neues Datum und neue Zeit angeben.', 'warning');
                        return;
                    }
                    if (!f.note.trim()) {
                        addNotification('Bei einer Spielverlegung ist eine Begründung verpflichtend.', 'warning');
                        return;
                    }
                    payload = { ...base, kind: 'reschedule', targetEventId: f.targetEventId,
                        proposed: { date: f.proposedDate, time: f.proposedTime, field: f.proposedField || '' } };
                } else {
                    // Team ergibt sich aus dem Profil; bei mehreren Teams ist es im Formular gewählt
                    const team = myTeams.length === 1 ? myTeams[0] : f.team;
                    if (!team) { addNotification('Bitte ein Team auswählen.', 'warning'); return; }
                    if (!f.date || !f.time) {
                        addNotification('Bitte Datum und Uhrzeit angeben.', 'warning');
                        return;
                    }
                    payload = { ...base, kind: 'new', event: {
                        type: REQUEST_EVENT_TYPE[f.type], team, field: f.field || '',
                        date: f.date, day: dateToWeekday(f.date),
                        time: f.time, duration: f.duration || 1.5, title: f.title.trim(),
                        cabin: [], trainer: userProfile.name, position: ''
                    } };
                }
                try {
                    await db.collection('requests').add(payload);
                    addNotification('Antrag eingereicht', 'success');
                    pushNotification(adminUids(), {
                        type: 'request_new', title: 'Neuer Antrag',
                        body: `${userProfile.name}: ${REQUEST_TYPE_LABELS[f.type] || f.type}`
                    });
                    setRequestForm(emptyRequestForm);
                } catch (e) {
                    addNotification('Antrag konnte nicht gesendet werden', 'warning');
                }
            };

            const finishRequest = (req, status, adminNote) => {
                db.collection('requests').doc(req.id).update({
                    status, adminNote: adminNote || '',
                    decidedBy: userProfile?.name || 'Admin', decidedAt: Date.now()
                }).catch(() => addNotification('Antrag konnte nicht aktualisiert werden', 'warning'));
            };

            // Antragsprüfung öffnen: Platz/Kabinen vorbelegen, dann Dialog anzeigen
            const openReview = (req) => {
                if (!isAdmin || !req) return;
                let field = '', cabin = [], position = '';
                if (req.kind === 'reschedule') {
                    const target = events.find(e => String(e.id) === String(req.targetEventId));
                    field = (req.proposed && req.proposed.field) || (target && target.field) || '';
                    cabin = (target && Array.isArray(target.cabin)) ? target.cabin : [];
                    position = (target && target.position) || '';
                } else {
                    field = (req.event && req.event.field) || '';
                    cabin = (req.event && Array.isArray(req.event.cabin)) ? req.event.cabin : [];
                    position = (req.event && req.event.position) || '';
                }
                setReviewForm({ field, cabin, position });
                setRequestReviewTarget(req);
                setRejectTarget(null);
                setRejectNote('');
            };

            // Antrag genehmigen – mit vom Admin gewähltem Platz, Kabinen und Position
            const confirmApproveRequest = (req, field, cabin, position) => {
                if (!isAdmin || !req) return;
                if (req.kind === 'reschedule') {
                    const target = events.find(e => String(e.id) === String(req.targetEventId));
                    if (!target) { addNotification('Das betroffene Spiel wurde nicht gefunden.', 'warning'); return; }
                    const p = req.proposed || {};
                    const updated = { ...target, field: field || target.field, cabin, position: position || '',
                        day: dateToWeekday(p.date) || target.day, time: p.time || target.time,
                        weekOffset: dateToWeekOffset(p.date), eventDate: p.date || '' };
                    const doIt = () => {
                        commitEvents(events.map(e => e.id === target.id ? updated : e));
                        finishRequest(req, 'approved');
                        setRequestReviewTarget(null);
                        addNotification('Verlegung genehmigt', 'success');
                        pushNotification([req.requestedBy], { type: 'request_approved', title: 'Antrag genehmigt',
                            body: `Deine Spielverlegung wurde genehmigt: ${updated.team} jetzt ${formatISODate(p.date)} ${updated.time} Uhr.` });
                    };
                    const conf = findConflicts(updated).filter(c => c.id !== target.id);
                    const closConf = closuresForEvent(updated);
                    if (conf.length > 0 || closConf.length > 0) { askConfirm(conflictMessage(conf, closConf, updated), doIt); }
                    else doIt();
                } else {
                    const ev = req.event || {};
                    const iso = ev.date || ev.eventDate || '';
                    const newEv = { ...ev, field: field || ev.field || '', cabin, position: position || '', id: Date.now(),
                        day: iso ? dateToWeekday(iso) : ev.day,
                        weekOffset: iso ? dateToWeekOffset(iso) : undefined,
                        eventDate: iso };
                    delete newEv.date;
                    const doIt = () => {
                        commitEvents([...events, newEv]);
                        finishRequest(req, 'approved');
                        setRequestReviewTarget(null);
                        addNotification('Antrag genehmigt – Termin angelegt', 'success');
                        pushNotification([req.requestedBy], { type: 'request_approved', title: 'Antrag genehmigt',
                            body: `Dein Antrag „${REQUEST_TYPE_LABELS[req.type] || req.type}" wurde genehmigt und der Termin angelegt.` });
                    };
                    const conf = findConflicts(newEv);
                    const closConf = closuresForEvent(newEv);
                    if (conf.length > 0 || closConf.length > 0) { askConfirm(conflictMessage(conf, closConf, newEv), doIt); }
                    else doIt();
                }
            };

            const rejectRequest = (req, note) => {
                if (!isAdmin) return;
                finishRequest(req, 'rejected', note);
                addNotification('Antrag abgelehnt', 'info');
                pushNotification([req.requestedBy], { type: 'request_rejected', title: 'Antrag abgelehnt',
                    body: `Dein Antrag „${REQUEST_TYPE_LABELS[req.type] || req.type}" wurde abgelehnt.${note && note.trim() ? ' Grund: ' + note.trim() : ''}` });
                setRejectTarget(null);
                setRejectNote('');
                setRequestReviewTarget(null);
            };

            const withdrawRequest = (req) => {
                askConfirm('Diesen Antrag zurückziehen?', () => {
                    db.collection('requests').doc(req.id).delete()
                        .then(() => addNotification('Antrag zurückgezogen', 'info'))
                        .catch(() => addNotification('Zurückziehen fehlgeschlagen', 'warning'));
                });
            };

            const validateEvent = (event) => {
                if (event.type === 'blocked') {
                    if (!event.field || !event.date || !event.time) {
                        return 'Bitte Platz, Tag und Zeit auswählen!';
                    }
                } else {
                    if (!event.field || !event.date || !event.time || !event.team) {
                        return 'Bitte alle Pflichtfelder ausfüllen!';
                    }
                }
                return null;
            };

            // Termin-Objekt aus dem Datum mit Wochentag/Wochen-Versatz anreichern
            const withDateFields = (ev, iso) => ({
                ...ev, date: iso, day: dateToWeekday(iso),
                weekOffset: dateToWeekOffset(iso), eventDate: iso
            });

            const addEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(newEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }

                // Serien nur für Trainingseinheiten – Spiele sind Einzeltermine
                const isSeries = newEvent.type === 'training' && !!newEvent.isSeries;

                const eventToAdd = {...newEvent};
                delete eventToAdd.isSeries;
                delete eventToAdd.endDate;
                if (eventToAdd.type === 'blocked') {
                    eventToAdd.team = 'SPERRE';
                    if (!eventToAdd.title) {
                        eventToAdd.title = 'Platzsperre';
                    }
                }

                // Serientermine im Voraus erzeugen (wöchentlich ab Datum bis Enddatum)
                let seriesEvents = null;
                if (isSeries) {
                    if (!newEvent.endDate) {
                        addNotification('Bitte ein Enddatum für die Serie wählen!', 'warning');
                        return;
                    }
                    const start = new Date(newEvent.date + 'T00:00:00');
                    const seriesId = 'S' + Date.now();
                    seriesEvents = [];
                    for (let week = 0; week < 60; week++) {
                        const d = new Date(start);
                        d.setDate(start.getDate() + week * 7);
                        const iso = toISODate(d);
                        if (iso > newEvent.endDate) break;
                        seriesEvents.push({ ...withDateFields(eventToAdd, iso), id: Date.now() + week, seriesId, isSeriesEvent: true });
                    }
                    if (seriesEvents.length === 0) {
                        addNotification('Im gewählten Zeitraum liegt kein Termin – bitte Enddatum prüfen.', 'warning');
                        return;
                    }
                }

                const singleEvent = { ...withDateFields(eventToAdd, newEvent.date), id: Date.now() };

                const commit = () => {
                    if (isSeries) {
                        commitEvents([...events, ...seriesEvents]);
                        addNotification(`${seriesEvents.length} Serientermine erstellt`, 'success');
                    } else {
                        commitEvents([...events, singleEvent]);
                        addNotification('Termin hinzugefügt', 'success');
                    }
                    setNewEvent(emptyNewEvent);
                    setShowAddModal(false);
                };

                if (!isSeries) {
                    const eventConflicts = findConflicts(singleEvent);
                    const closureConflicts = closuresForEvent(singleEvent);
                    if (eventConflicts.length > 0 || closureConflicts.length > 0) {
                        askConfirm(conflictMessage(eventConflicts, closureConflicts, singleEvent), commit);
                        return;
                    }
                }
                commit();
            };

            const updateEvent = () => {
                if (!requireEditor()) return;
                const error = validateEvent(editingEvent);
                if (error) {
                    addNotification(error, 'warning');
                    return;
                }
                const updated = withDateFields(editingEvent, editingEvent.date);
                const commit = () => {
                    commitEvents(events.map(e => e.id === editingEvent.id ? updated : e));
                    setEditingEvent(null);
                    addNotification('Termin aktualisiert', 'success');
                };

                const eventConflicts = findConflicts(updated);
                const closureConflicts = closuresForEvent(updated);
                if (eventConflicts.length > 0 || closureConflicts.length > 0) {
                    askConfirm(conflictMessage(eventConflicts, closureConflicts, updated), commit);
                } else {
                    commit();
                }
            };

            // Findet alle Termine, die zur selben Serie gehören
            const getSeriesSiblings = (event) => {
                if (!event) return [];
                if (event.seriesId) return events.filter(e => e.seriesId === event.seriesId);
                // Altdaten ohne seriesId: heuristisch über gleiche Eckdaten
                if (event.isSeriesEvent) {
                    return events.filter(e => e.isSeriesEvent && e.day === event.day && e.time === event.time
                        && e.field === event.field && e.team === event.team && e.type === event.type);
                }
                return [event];
            };

            // Löscht eine Menge von Terminen (mit Rückgängig-Hinweis)
            const doDeleteEvents = (ids, label) => {
                const previous = events;
                const idSet = new Set(ids);
                commitEvents(events.filter(e => !idSet.has(e.id)));
                setEditingEvent(null);
                setSeriesDeleteTarget(null);
                addNotification(label || 'Termin gelöscht', 'info', {
                    duration: 7000,
                    action: {
                        label: 'Rückgängig',
                        onClick: () => { commitEvents(previous); addNotification('Wiederhergestellt', 'success'); }
                    }
                });
            };

            const deleteEvent = (id) => {
                if (!requireEditor()) return;
                const event = events.find(e => e.id === id);
                if (!event) return;
                // Serienelement: Admin bekommt die Wahl, die ganze Serie zu löschen
                if (isAdmin && getSeriesSiblings(event).length > 1) {
                    setEditingEvent(null);
                    setSeriesDeleteTarget(event);
                    return;
                }
                askConfirm('Diesen Termin wirklich löschen?', () => doDeleteEvents([id], 'Termin gelöscht'));
            };

            const addClosure = () => {
                if (!requireEditor()) return;
                if (!newClosure.field || !newClosure.fromDate) {
                    addNotification('Bitte Platz und Von-Datum auswählen!', 'warning');
                    return;
                }
                const toDate = newClosure.toDate || newClosure.fromDate;
                if (toDate < newClosure.fromDate) {
                    addNotification('Das Bis-Datum darf nicht vor dem Von-Datum liegen!', 'warning');
                    return;
                }
                commitClosures([...closures, { ...newClosure, toDate, id: Date.now() }]);
                setNewClosure({ field: '', fromDate: '', toDate: '', reason: '' });
                addNotification('Platzsperre eingetragen', 'success');
            };

            const deleteClosure = (id) => {
                if (!requireEditor()) return;
                askConfirm('Diese Platzsperre wirklich aufheben?', () => {
                    const previous = closures;
                    commitClosures(closures.filter(c => c.id !== id));
                    addNotification('Platzsperre aufgehoben', 'info', {
                        duration: 7000,
                        action: {
                            label: 'Rückgängig',
                            onClick: () => { commitClosures(previous); addNotification('Platzsperre wiederhergestellt', 'success'); }
                        }
                    });
                });
            };

            // Trainer-Auswahl (Namen aus der Benutzer-Tabelle, alphabetisch)
            const trainerOptions = [...allUsers]
                .filter(u => u.name)
                .sort((a, b) => a.name.localeCompare(b.name));

            const exportToCSV = () => {
                const headers = ['Platz', 'Tag', 'Zeit', 'Dauer', 'Typ', 'Team', 'Gegner', 'Trainer', 'Kabine', 'Position'];
                const csv = [
                    headers.join(','),
                    ...events.map(e => [
                        fields.find(f => f.id === e.field)?.name || '',
                        e.day, e.time, e.duration, eventTypes[e.type].label,
                        e.team, e.title || '', e.trainer || '', cabinText(e.cabin),
                        positions.find(p => p.value === e.position)?.label || ''
                    ].map(field => `"${field}"`).join(','))
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'termine.csv';
                a.click();
                URL.revokeObjectURL(url);
                addNotification('CSV exportiert', 'success');
            };

            const exportToJSON = () => {
                const dataStr = JSON.stringify(events, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `termine_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                addNotification('Backup erstellt', 'success');
            };

            const importFromJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!requireEditor()) { event.target.value = ''; return; }

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedEvents = JSON.parse(e.target.result);
                        if (Array.isArray(importedEvents)) {
                            commitEvents(importedEvents);
                            addNotification('Daten importiert', 'success');
                        } else {
                            addNotification('Ungültiges Dateiformat', 'warning');
                        }
                    } catch (error) {
                        addNotification('Fehler beim Importieren', 'warning');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const clearFilters = () => {
                setFilters({ field: '', type: '', team: '' });
            };

            const hasActiveFilters = () => {
                return filters.field || filters.type || filters.team;

            const todayISO = toISODate(new Date());

                                    {FIREBASE_READY && authUser && !userProfile && <span className="bg-orange-100 text-orange-800 px-2 py-0.5 rounded-full text-xs flex items-center gap-1"><Icon name="alert" className="w-3 h-3" /> Konto ohne Profil</span>}

                            )}
                            {FIREBASE_READY && authUser && (

                            ))}
                        </div>
                    </div>
                    <div className="flex gap-2 flex-wrap no-print w-full sm:w-auto mb-4">
                            {!isMobile && (

                                <button onClick={() => setViewMode('calendar')} title="Kalenderansicht" aria-label="Kalenderansicht" className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1.5 ${viewMode === 'calendar' ? 'bg-white shadow font-medium' : 'hover:bg-gray-200'}`}><Icon name="calendar" /> <span>Kalender</span></button>
                                <button onClick={() => setViewMode('fields')} title="Platzübersicht" aria-label="Platzübersicht" className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1.5 ${viewMode === 'fields' ? 'bg-white shadow font-medium' : 'hover:bg-gray-200'}`}><Icon name="grid" /> <span>Plätze</span></button>
                            </div>
                            )}
                            <div className="flex gap-2 flex-wrap w-full sm:w-auto">
                                <button onClick={() => setShowFilters(s => !s)} className={`flex-1 sm:flex-none px-3 py-2 rounded text-sm transition-colors flex items-center justify-center gap-1.5 ${hasActiveFilters() ? 'bg-orange-500 text-white hover:bg-orange-600' : 'bg-gray-200 text-gray-800 hover:bg-gray-300'}`}><Icon name="filter" /> <span>Filter{hasActiveFilters() ? ' •' : ''}</span></button>
                                {viewMode === 'calendar' && (
                                    <button onClick={() => setPlanDesign(d => d === '1' ? '2' : '1')} title="Darstellung umschalten" className="flex-1 sm:flex-none bg-gray-200 text-gray-800 px-3 py-2 rounded text-sm hover:bg-gray-300 transition-colors flex items-center justify-center gap-1.5"><Icon name="grid" /> <span>{planDesign === '1' ? 'Design 1: Karten' : 'Design 2: nach Platz'}</span></button>
                                )}

                    {/* Tabellenansicht */}
                    {dataLoaded && viewMode === 'table' && (

                                {getWeekDates(currentWeek).map(({ day, date, month, isToday }) => (
