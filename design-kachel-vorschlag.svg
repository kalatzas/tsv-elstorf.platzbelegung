<svg xmlns="http://www.w3.org/2000/svg" width="900" height="742" viewBox="0 0 900 742" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="card1"><rect x="30" y="92"  width="840" height="170" rx="18"/></clipPath>
    <clipPath id="card2"><rect x="30" y="280" width="840" height="170" rx="18"/></clipPath>
    <clipPath id="card3"><rect x="30" y="468" width="840" height="170" rx="18"/></clipPath>
