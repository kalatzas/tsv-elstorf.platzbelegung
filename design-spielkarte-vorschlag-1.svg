<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="a1"><rect x="30" y="92"  width="840" height="150" rx="16"/></clipPath>
    <clipPath id="a2"><rect x="30" y="262" width="840" height="150" rx="16"/></clipPath>
    <clipPath id="a3"><rect x="30" y="432" width="840" height="150" rx="16"/></clipPath>
  </defs>

  <rect width="900" height="640" fill="#f3f4f6"/>

  <text x="30" y="42" font-size="23" font-weight="700" fill="#111827">Vorschlag 1 — Anker links, Info-Badge unten rechts</text>
  <text x="30" y="68" font-size="14" fill="#6b7280">Platz-Kuerzel als Anker links. Oben gross: Team und Gegner. Typ / "Antrag" als Pille unten rechts.</text>

  <!-- ===== Karte 1: Pflichtspiel mit Gegner ===== -->
  <rect x="30" y="92" width="840" height="150" rx="16" fill="#ffffff" stroke="#eceef1" filter="url(#sh)"/>
  <rect x="30" y="92" width="120" height="150" fill="#fef3c7" clip-path="url(#a1)"/>
  <line x1="150" y1="92" x2="150" y2="242" stroke="#e5e7eb"/>
  <text x="90" y="184" font-size="44" font-weight="800" fill="#b45309" text-anchor="middle">P3</text>

  <circle cx="184" cy="128" r="7" fill="#4f46e5"/>
  <text x="200" y="137" font-size="26" font-weight="700" fill="#111827">U16 <tspan fill="#9ca3af" font-weight="400">–</tspan> <tspan fill="#1d4ed8">FC Hamburg</tspan></text>

  <g transform="translate(176,156)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.3V8l2.6 1.6"/></g>
  <text x="200" y="170" font-size="15" fill="#4b5563">Dienstag, 18:00 – 20:00 Uhr</text>
  <g transform="translate(176,182)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14.5s5-4.2 5-8a5 5 0 0 0-10 0c0 3.8 5 8 5 8z"/><circle cx="8" cy="6.5" r="1.9"/></g>
  <text x="200" y="196" font-size="15" fill="#4b5563">Platz 3 (ganzer Platz)  ·  Kabine 1</text>

  <rect x="726" y="196" width="130" height="32" rx="16" fill="#dbeafe"/>
  <text x="791" y="217" font-size="14" font-weight="600" fill="#1d4ed8" text-anchor="middle">Pflichtspiel</text>

  <!-- ===== Karte 2: Training ohne Gegner ===== -->
  <rect x="30" y="262" width="840" height="150" rx="16" fill="#ffffff" stroke="#eceef1" filter="url(#sh)"/>
  <rect x="30" y="262" width="120" height="150" fill="#dcfce7" clip-path="url(#a2)"/>
  <line x1="150" y1="262" x2="150" y2="412" stroke="#e5e7eb"/>
  <text x="90" y="354" font-size="44" font-weight="800" fill="#15803d" text-anchor="middle">P2</text>

  <circle cx="184" cy="298" r="7" fill="#0d9488"/>
  <text x="200" y="307" font-size="26" font-weight="700" fill="#111827">U13</text>

  <g transform="translate(176,326)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.3V8l2.6 1.6"/></g>
  <text x="200" y="340" font-size="15" fill="#4b5563">Donnerstag, 17:00 – 18:30 Uhr</text>
  <g transform="translate(176,352)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14.5s5-4.2 5-8a5 5 0 0 0-10 0c0 3.8 5 8 5 8z"/><circle cx="8" cy="6.5" r="1.9"/></g>
  <text x="200" y="366" font-size="15" fill="#4b5563">Platz 2 (Links)  ·  Kabine 2</text>
  <g transform="translate(176,378)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round"><circle cx="8" cy="5.5" r="2.9"/><path d="M3 13.6a5 5 0 0 1 10 0"/></g>
  <text x="200" y="392" font-size="15" fill="#4b5563">Anna Schmidt</text>

  <rect x="746" y="366" width="110" height="32" rx="16" fill="#dcfce7"/>
  <text x="801" y="387" font-size="14" font-weight="600" fill="#15803d" text-anchor="middle">Training</text>

  <!-- ===== Karte 3: Antrag (Freundschaftsspiel) ===== -->
  <rect x="30" y="432" width="840" height="150" rx="16" fill="#ffffff" stroke="#fbbf24" stroke-width="2" stroke-dasharray="7 5" filter="url(#sh)"/>
  <rect x="30" y="432" width="120" height="150" fill="#fee2e2" clip-path="url(#a3)"/>
  <line x1="150" y1="432" x2="150" y2="582" stroke="#e5e7eb"/>
  <text x="90" y="524" font-size="44" font-weight="800" fill="#b91c1c" text-anchor="middle">P1</text>

  <circle cx="184" cy="468" r="7" fill="#eab308"/>
  <text x="200" y="477" font-size="26" font-weight="700" fill="#111827">U9 <tspan fill="#9ca3af" font-weight="400">–</tspan> <tspan fill="#a16207">SV Beispiel</tspan></text>

  <g transform="translate(176,496)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.3V8l2.6 1.6"/></g>
  <text x="200" y="510" font-size="15" fill="#4b5563">Samstag, 10:00 – 11:30 Uhr</text>
  <g transform="translate(176,522)" stroke="#6b7280" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14.5s5-4.2 5-8a5 5 0 0 0-10 0c0 3.8 5 8 5 8z"/><circle cx="8" cy="6.5" r="1.9"/></g>
  <text x="200" y="536" font-size="15" fill="#4b5563">Platz 1 (ganzer Platz)</text>

  <rect x="612" y="536" width="100" height="32" rx="16" fill="#fef08a"/>
  <text x="662" y="557" font-size="14" font-weight="700" fill="#854d0e" text-anchor="middle">Antrag</text>
  <rect x="722" y="536" width="134" height="32" rx="16" fill="#fef9c3"/>
  <text x="789" y="557" font-size="14" font-weight="600" fill="#a16207" text-anchor="middle">Freundschaftsspiel</text>
</svg>
